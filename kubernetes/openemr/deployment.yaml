apiVersion: apps/v1
kind: Deployment
metadata:  
  labels:
    name: openemr
  name: openemr
spec:
  replicas: 3
  selector:
    matchLabels:
      name: openemr
  strategy:
    type: Recreate
  template:
    metadata:      
      labels:
        name: openemr
    spec:
      initContainers:
      - name: init-mysql-wait
        image: busybox:1.37
        command: ['sh', '-c', "until nslookup mysql.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mysql; sleep 2; done"]
      - name: init-redis-wait
        image: busybox:1.37
        command: ['sh', '-c', "until nslookup redis.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for redis; sleep 2; done"]
      containers:
      - env:
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_PASS
          valueFrom:
            secretKeyRef:
              name: openemr-credentials
              key: mysql-pass
        - name: MYSQL_ROOT_PASS
          valueFrom:
            secretKeyRef:
              name: mysql-credentials
              key: password
        - name: MYSQL_USER
          value: "openemr"
        - name: OE_PASS
          valueFrom:
            secretKeyRef:
              name: openemr-credentials
              key: admin-pass
        - name: OE_USER
          value: "admin"
        - name: REDIS_SERVER
          value: "redis-0.redis.default.svc.cluster.local"
        - name: REDIS_PASSWORD
          value: "defaultpassword"
        - name: REDIS_TLS
          value: "yes"
        - name: REDIS_X509
          value: "yes"
        # To downgrade redis connection security:
        #   tls (no client certs): remove REDIS_X509 above and remove redis cert/key volume mounts below
        #   tcp (no encryption): also remove REDIS_TLS above and remove redis ca volume mount below
        - name: SWARM_MODE
          value: "yes"
        - name: FORCE_DATABASE_X509_CONNECT
          value: "1"
        # To downgrade mysql connection security:
        #   tls (no client certs): change FORCE_DATABASE_X509_CONNECT to FORCE_DATABASE_SSL_CONNECT
        #     and remove mysql cert/key volume mounts below
        #   tcp (no encryption): also remove the env var above and remove mysql ca volume mount below
        image: openemr/openemr:7.0.3
        name: openemr
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          limits:
            cpu: 1000m
            memory: 1G
        readinessProbe:
          exec:
            command:
            - cat
            - /root/instance-swarm-ready
          initialDelaySeconds: 5
          periodSeconds: 30
        livenessProbe:
          tcpSocket:
            port: 443
          initialDelaySeconds: 60
          periodSeconds: 30
        volumeMounts:
        - mountPath: /root/certs/mysql/server
          name: mysql-openemr-client-certs
        - mountPath: /root/certs/redis
          name: redis-openemr-client-certs
        - mountPath: /var/www/localhost/htdocs/openemr/sites
          name: websitevolume
        - mountPath: /etc/ssl
          name: sslvolume
        - mountPath: /etc/letsencrypt
          name: letsencryptvolume
      restartPolicy: Always     
      volumes:
      - name: mysql-openemr-client-certs
        secret:
          secretName: mysql-openemr-client-certs
          items:
          - key: ca.crt
            path: mysql-ca
          - key: tls.crt
            path: mysql-cert
          - key: tls.key
            path: mysql-key
      - name: redis-openemr-client-certs
        secret:
          secretName: redis-openemr-client-certs
          items:
          - key: ca.crt
            path: redis-ca
          - key: tls.crt
            path: redis-cert
          - key: tls.key
            path: redis-key
      - name: websitevolume
        persistentVolumeClaim:
          claimName: websitevolume
      - name: sslvolume
        persistentVolumeClaim:
          claimName: sslvolume
      - name: letsencryptvolume
        persistentVolumeClaim:
          claimName: letsencryptvolume

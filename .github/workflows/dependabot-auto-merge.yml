name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Only auto-merge Kubernetes Docker image updates (not other ecosystems)
      - name: Enable auto-merge for Kubernetes Docker updates
        if: steps.metadata.outputs.package-ecosystem == 'docker' && (steps.metadata.outputs.directory == '/kubernetes' || startsWith(steps.metadata.outputs.directory, '/kubernetes/'))
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Flex Edge Dockers Nightly Build

# This workflow builds the OpenEMR Flex Docker images with Alpine Edge and PHP versions 8.3, 8.4, and 8.5.
# And in this configuration will create following dockers (and tags):
#    PHP 8.3: openemr/openemr:flex-edge-php-8.3
#    PHP 8.4: openemr/openemr:flex-edge-php-8.4, openemr/openemr:flex-edge
#    PHP 8.5: openemr/openemr:flex-edge-php-8.5
#
# php_versions is a JSON array of PHP versions to build.
#
# The php_default will determine the default PHP version (ie. above tag without a php version).
#
# The is_default_flex environment variable is used to determine if this is the default flex image.
#  (This is NOT the default flex image, so is_default_flex is false)
on:
  # Schedule disabled as part of the docker-image migration to
  # openemr/openemr core. The flex-edge nightly tags are now published
  # by openemr/openemr's docker-build-edge.yml (06:00 UTC). This file
  # stays here with workflow_dispatch as a manual escape hatch only,
  # slated for deletion in phase 5 of the migration. See
  # openemr-devops#790 for the migration tracking issue.
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-flex-core.yml
    with:
      is_default_flex: false
      alpine_version: "edge"
      php_versions: '["8.3", "8.4", "8.5"]'
      php_default: "8.5"
    secrets: inherit

# This will run the OpenEMR flex dockers with Alpine Edge version. It will test the flex docker images in both
#  development (ie. dev) mode (codebase used from a shared volume) and production (ie. prod) mode (codebase collected via git).
#  - is_production_docker is required and needs to be false.
#  - alpine_versions is set to edge
#  - php_versions are set to 8.3, 8.4 and 8.5
#  - flex_timing is set to true to emit TIMING markers in openemr.sh (openemr-devops#797).
#  - note not using the coverage settings (is_flex_coverage_docker, flex_coverage_php_version) in this workflow.
#    Moved to test-flex-323.yml because kcov-instrumented webpack on Alpine edge takes >20m on GitHub runners
#    (openemr-devops#797). Edge is for signal-only; coverage belongs on stable.

name: OpenEMR Flex Edge Docker Test

on:
  push:
    branches:
    - master
    paths:
    - '.github/workflows/test-flex-edge.yml'
    - 'docker/openemr/flex/**'
    - '.github/actions/test-actions-core/action.yml'
    - '.github/workflows/test-core.yml'
  pull_request:
    branches:
    - master
    paths:
    - '.github/workflows/test-flex-edge.yml'
    - 'docker/openemr/flex/**'
    - '.github/actions/test-actions-core/action.yml'
    - '.github/workflows/test-core.yml'

jobs:
  build:
    uses: ./.github/workflows/test-core.yml
    with:
      is_production_docker: false
      alpine_version: "edge"
      php_versions: '["8.3", "8.4", "8.5"]'
      flex_timing: true

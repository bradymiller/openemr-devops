name: openemr-cmd e2e (real docker)

# Tier 2 of the openemr-cmd test coverage roadmap. Unlike the hermetic
# bats suite (test-bats-openemr-cmd.yml), this workflow exercises
# openemr-cmd against a real openemr/openemr image. Four parallel jobs:
#   - worktree-lifecycle-e2e: single-worktree happy path on env=easy,
#     `worktree exec` end-to-end, the A5 container-uid-on-remove probe
#     contract, the set-env-while-running refusal, and a down→up
#     restart cycle proving volumes persist.
#   - worktree-multi-concurrent-e2e: two worktrees on env=easy-light
#     running side-by-side, distinct ports + compose projects, exec
#     routes each to its own container (no cross-talk).
#   - nonworktree-lifecycle-e2e: the plain `openemr-cmd up` / `down`
#     path against the standard openemr/docker/development-easy stack
#     (no worktree). Confirms top-level lifecycle, container auto-
#     detection, exec via auto-detected id, prek-in-container, and
#     dl/dn admin commands against a real running stack.
#   - functional-roundtrip-e2e: the data-flow contract between
#     openemr-cmd and the in-container `/root/devtools` scripts —
#     irp inserts patients, bs produces a real snapshot, gc+pc shuttle
#     the capsule out and back in, rs restores data on a FRESH stack.
#     Catches cross-repo contract drift (openemr-cmd's CLI assumes a
#     particular /root/devtools interface; this job confirms the
#     in-container scripts still match it end-to-end).
#
# Cost: ~10-20 min per job for the first three; the functional
# round-trip job is heavier (~30-40 min, two stack startups). All four
# run in parallel on separate runners, so wall time is bounded by the
# slowest. Runs on every PR that touches openemr-cmd or this workflow
# file — slower PR cycle is the deliberate trade for catching
# regressions before merge rather than after.

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/test-bats-openemr-cmd-real-docker.yml'
      - 'utilities/openemr-cmd/openemr-cmd'
      - 'utilities/openemr-cmd/openemr-cmd-h'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/test-bats-openemr-cmd-real-docker.yml'
      - 'utilities/openemr-cmd/openemr-cmd'
      - 'utilities/openemr-cmd/openemr-cmd-h'
  workflow_dispatch:

# Read-only GITHUB_TOKEN — the workflow only clones public repos, pulls a
# public image, and runs containers locally; no write surfaces touched.
permissions:
  contents: read

# Multiple in-flight runs would race on docker daemon resources (image
# pull, container names, port allocation). Serialize per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  worktree-lifecycle-e2e:
    name: e2e — add --start → healthy → down → remove
    runs-on: ubuntu-22.04
    # Bumped from 25 → 35 to accommodate the additional set-env-refusal
    # check (cheap) and the down→up restart cycle (a second healthy-poll
    # window — typically ~3-5 min once volumes are warm but bounded at 15).
    timeout-minutes: 35
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          # --version exits 14 by design (VERSION_EXIT_CODE); don't fail the step.
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          realpath --version | head -1
          df -h /

      - name: worktree add test-e2e -b --base master --start
        working-directory: openemr
        env:
          # --base master uses the local commit we just cloned, skipping the
          # canonical-URL fetch (the fetch behavior is covered by the
          # hermetic bats suite; this workflow is about the docker side).
          WT_CANONICAL_URL: file://${{ github.workspace }}/openemr
        run: |
          openemr-cmd worktree add test-e2e -b --base master --start
          openemr-cmd worktree list

      - name: Wait for openemr container to become healthy
        run: |
          # Compose project naming: openemr-<slug>; service: openemr; replica: 1.
          cname="openemr-test-e2e-openemr-1"
          echo "polling docker inspect for ${cname} health (healthcheck has start_period: 3m)..."
          # The openemr healthcheck has start_period: 3m and start_interval: 10s,
          # so the earliest "healthy" can appear is around 10s into the run, but
          # in practice MySQL init + composer install + sites bootstrap push it
          # to several minutes. Poll for up to ~15 min.
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy)
                echo "container reported healthy"
                exit 0
                ;;
              unhealthy)
                echo "FAIL: container reported unhealthy"
                docker logs "${cname}" --tail 200
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "FAIL: container never became healthy in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: HTTP smoke (openemr responds on port 8301)
        run: |
          # WT_HTTP_PORT = 8300 + offset (=1 for first worktree).
          # Once health is healthy, /meta/health/readyz returns 200; the
          # bare / serves the login redirect (302/303).
          for i in $(seq 1 12); do
            # --connect-timeout/--max-time keep one bad iteration from
            # eating the whole loop budget if the local TCP path is wedged.
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8301/" || true)
            echo "[${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: openemr did not respond with 2xx/3xx on port 8301"
          exit 1

      - name: worktree exec test-e2e e -- echo sentinel (resolves container by compose project label)
        working-directory: openemr
        run: |
          # cmd_worktree_exec resolves the openemr container via
          #   --filter label=com.docker.compose.project=openemr-test-e2e
          #   --filter label=com.docker.compose.service=openemr
          # then re-invokes openemr-cmd with -d <container_id>, which runs
          # `docker exec -i <id> sh -c "<command>"` for the `e` subcommand.
          # We grep stdout for a fixed sentinel so the assertion fails loudly
          # if exec ever started routing to a different container or silently
          # short-circuiting.
          sentinel="openemr-cmd-exec-e2e-sentinel-$$-$(date +%s)"
          out=$(openemr-cmd worktree exec test-e2e e "echo ${sentinel}")
          echo "exec stdout: ${out}"
          if ! grep -Fqx "${sentinel}" <<< "${out}"; then
              echo "FAIL: exec stdout did not contain the sentinel"
              exit 1
          fi

      - name: "worktree set-env while stack is running (expected: refused with 'Stack must be down')"
        working-directory: openemr
        run: |
          # cmd_worktree_set_env checks `docker compose ps -aq` for running
          # containers; if any are up, it dies with "Stack must be down
          # before switching env". Bats covers this hermetically; here we
          # confirm the contract holds against a real running stack.
          set +e
          openemr-cmd worktree set-env test-e2e easy-light > /tmp/setenv-out.txt 2>&1
          rc=$?
          set -e
          cat /tmp/setenv-out.txt
          if [[ "${rc}" = "0" ]]; then
              echo "FAIL: set-env unexpectedly succeeded against a running stack"
              exit 1
          fi
          grep -q "Stack must be down" /tmp/setenv-out.txt \
              || { echo "FAIL: refusal message not surfaced"; exit 1; }
          # State env unchanged.
          current_env=$(jq -r '."test-e2e".env' .worktrees.json)
          [[ "${current_env}" = "easy" ]] \
              || { echo "FAIL: env field changed to '${current_env}' despite refusal"; exit 1; }

      - name: worktree down test-e2e --keep-volumes (first cycle)
        working-directory: openemr
        run: openemr-cmd worktree down test-e2e --keep-volumes

      - name: worktree up test-e2e (restart with preserved volumes)
        working-directory: openemr
        run: |
          # Down --keep-volumes preserved the mysql data volume + the openemr
          # state. Bring the stack back up and confirm it returns to healthy.
          # Volume-preserving restart is the basis for set-env, prek edits,
          # backups, and dev iteration; pinning it here catches regressions
          # where down + up would silently rebuild empty state.
          openemr-cmd worktree up test-e2e

      - name: Wait for openemr container to become healthy (second cycle)
        run: |
          cname="openemr-test-e2e-openemr-1"
          # Restart is typically faster than first boot since composer/mysql
          # init is already done, but the healthcheck still has its 3m
          # start_period. Same 15-min budget as the first wait.
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] (restart) status=${status}"
            case "${status}" in
              healthy)
                echo "container reported healthy after restart"
                exit 0
                ;;
              unhealthy)
                echo "FAIL: container reported unhealthy after restart"
                docker logs "${cname}" --tail 200
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "FAIL: container never returned to healthy after restart in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: HTTP smoke after restart (still responds on port 8301)
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8301/" || true)
            echo "[restart ${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: openemr did not respond on port 8301 after restart"
          exit 1

      - name: worktree down test-e2e --keep-volumes (second cycle — prep for A5 probe)
        working-directory: openemr
        run: openemr-cmd worktree down test-e2e --keep-volumes

      - name: "worktree remove WITHOUT chown (expected: probe refuses, nothing destroyed)"
        working-directory: openemr
        run: |
          # A5 contract: the openemr container writes files into the
          # worktree's bind-mount as root/apache uids during startup. Before
          # the permission-probe fix, the script would proceed past compose
          # down --volumes + git worktree remove --force and only fail
          # mid-rm — leaving partial state on disk. With the probe in place,
          # remove must bail BEFORE any destructive op, with a clear chown
          # hint and ALL state intact for retry.
          set +e
          echo y | openemr-cmd worktree remove test-e2e > /tmp/remove-out.txt 2>&1
          rc=$?
          set -e
          cat /tmp/remove-out.txt
          if [[ "${rc}" = "0" ]]; then
              echo "FAIL: remove unexpectedly succeeded without sudo chown"
              exit 1
          fi
          grep -q "is not writable by you" /tmp/remove-out.txt \
              || { echo "FAIL: probe did not surface the writability hint"; exit 1; }
          grep -q "sudo chown -R" /tmp/remove-out.txt \
              || { echo "FAIL: probe did not surface the chown command"; exit 1; }
          # Nothing destroyed: state entry preserved, dir preserved, volumes
          # preserved (compose down --volumes never ran), lockfile released.
          if ! jq -e '."test-e2e"' .worktrees.json >/dev/null; then
              echo "FAIL: state entry missing after probe-refused remove"
              cat .worktrees.json
              exit 1
          fi
          if [[ ! -d "${{ github.workspace }}/openemr-wt-test-e2e" ]]; then
              echo "FAIL: worktree dir gone after probe-refused remove"
              exit 1
          fi
          if [[ -e ".worktrees.json.lock" ]]; then
              echo "FAIL: state lockfile lingered after probe-refused remove"
              ls -la .worktrees.json.lock
              exit 1
          fi
          # Volumes still around (compose down --volumes did NOT run).
          remaining=$(docker volume ls -q --filter "name=openemr-test-e2e_" | wc -l)
          if [[ "${remaining}" = "0" ]]; then
              echo "FAIL: volumes were purged despite probe refusing"
              docker volume ls
              exit 1
          fi
          echo "as expected: probe refused, ${remaining} volumes preserved, state intact"

      - name: worktree remove test-e2e (with chown workaround)
        working-directory: openemr
        run: |
          # Documented workaround: chown the worktree dir back to the runner
          # uid so the probe + downstream destructive ops can succeed.
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/openemr-wt-test-e2e"
          # `remove` prompts; pipe 'y' to confirm.
          echo y | openemr-cmd worktree remove test-e2e

      - name: Verify state hygiene
        working-directory: openemr
        run: |
          # State entry should be gone from .worktrees.json.
          if jq -e '."test-e2e"' .worktrees.json 2>/dev/null; then
            echo "FAIL: state entry still present"
            cat .worktrees.json
            exit 1
          fi
          # Worktree dir should be gone from WORKTREE_PARENT (= parent of openemr/).
          if [ -d "${{ github.workspace }}/openemr-wt-test-e2e" ]; then
            echo "FAIL: worktree dir still on disk"
            exit 1
          fi
          # Compose project's volumes should be gone (remove without
          # --keep-volumes calls `down --volumes` under the hood).
          remaining=$(docker volume ls -q --filter "name=openemr-test-e2e_" | wc -l)
          if [ "${remaining}" -ne 0 ]; then
            echo "FAIL: ${remaining} compose volumes left over:"
            docker volume ls --filter "name=openemr-test-e2e_"
            exit 1
          fi
          echo "state clean"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== .worktrees.json ====="
          cat openemr/.worktrees.json 2>/dev/null || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          echo "===== openemr container logs (last 500) ====="
          docker logs openemr-test-e2e-openemr-1 --tail 500 2>/dev/null || true
          echo "===== mysql container logs (last 200) ====="
          docker logs openemr-test-e2e-mysql-1 --tail 200 2>/dev/null || true

  worktree-multi-concurrent-e2e:
    # Two worktrees on the same primary repo, started one after the other,
    # left running in parallel. Verifies that:
    #   - offset allocation picks distinct ports across stacks (8301, 8302)
    #   - state lock serializes the two adds without dropping either entry
    #   - distinct compose project names keep the docker stacks isolated
    #     (no container name collisions, no port collisions, no volume
    #     bleed-through across projects)
    # Both stacks use the lighter 'easy-light' env to keep total wall time
    # bounded; the full 'easy' lifecycle is covered by the job above.
    name: e2e — two concurrent worktrees, distinct stacks
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      - name: worktree add multi-a + multi-b (sequential, both --start)
        working-directory: openemr
        env:
          WT_CANONICAL_URL: file://${{ github.workspace }}/openemr
        run: |
          # The state lock means we can't truly parallelize the two `add`
          # invocations from a shell perspective — they'd serialize on the
          # lock anyway. Run them sequentially; the concurrency assertion is
          # that BOTH end up with their own offset/dir/project entries and
          # BOTH stacks come up alongside one another.
          openemr-cmd worktree add multi-a -b --base master --start --env easy-light
          openemr-cmd worktree add multi-b -b --base master --start --env easy-light
          openemr-cmd worktree list

      - name: State has both entries with distinct offsets
        working-directory: openemr
        run: |
          jq . .worktrees.json
          # Both entries present.
          jq -e '."multi-a" and ."multi-b"' .worktrees.json >/dev/null \
              || { echo "FAIL: missing state entry"; cat .worktrees.json; exit 1; }
          # Distinct offsets (proves wt_next_offset didn't hand out duplicates).
          oa=$(jq -r '."multi-a".offset' .worktrees.json)
          ob=$(jq -r '."multi-b".offset' .worktrees.json)
          if [[ "${oa}" = "${ob}" ]]; then
              echo "FAIL: both entries share offset ${oa}"
              exit 1
          fi
          echo "offsets: multi-a=${oa}, multi-b=${ob}"

      - name: Wait for BOTH openemr containers to become healthy
        run: |
          # easy-light's openemr container uses the same healthcheck contract
          # as the easy stack: start_period: 3m. Poll both up to ~15 min;
          # bail as soon as either reports unhealthy.
          cname_a="openemr-multi-a-openemr-1"
          cname_b="openemr-multi-b-openemr-1"
          for i in $(seq 1 90); do
            sa=$(docker inspect --format='{{.State.Health.Status}}' "${cname_a}" 2>/dev/null || echo missing)
            sb=$(docker inspect --format='{{.State.Health.Status}}' "${cname_b}" 2>/dev/null || echo missing)
            echo "[${i}/90 @ $((i*10))s] multi-a=${sa} multi-b=${sb}"
            if [[ "${sa}" = "healthy" && "${sb}" = "healthy" ]]; then
                echo "both containers healthy"
                exit 0
            fi
            if [[ "${sa}" = "unhealthy" || "${sb}" = "unhealthy" ]]; then
                echo "FAIL: a container reported unhealthy"
                docker logs "${cname_a}" --tail 200 || true
                docker logs "${cname_b}" --tail 200 || true
                exit 1
            fi
            sleep 10
          done
          echo "FAIL: both containers did not reach healthy in ~15 min"
          docker ps -a
          exit 1

      - name: HTTP smoke on BOTH ports (8301, 8302 — no cross-talk)
        run: |
          # easy-light at offset 1 and 2 → ports 8301 and 8302.
          # Verify each port responds, then verify they're talking to
          # DIFFERENT stacks by hitting a per-stack identifier. The simplest
          # cross-talk check: ensure each port's container hostname (from
          # docker exec) is the OTHER container's hostname.
          for port in 8301 8302; do
            ok=""
            for i in $(seq 1 12); do
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                  --connect-timeout 5 --max-time 10 \
                  "http://localhost:${port}/" || true)
              echo "[${port}/${i}/12] HTTP ${code}"
              case "${code}" in
                200|302|303) ok=1; break ;;
              esac
              sleep 5
            done
            [[ -n "${ok}" ]] || { echo "FAIL: port ${port} did not respond"; exit 1; }
          done
          # Cross-talk check: container IDs should differ between the two
          # compose projects (sanity that we have two real stacks, not one
          # serving two ports).
          id_a=$(docker ps --filter "label=com.docker.compose.project=openemr-multi-a" \
                          --filter "label=com.docker.compose.service=openemr" \
                          --format '{{.ID}}' | head -n1)
          id_b=$(docker ps --filter "label=com.docker.compose.project=openemr-multi-b" \
                          --filter "label=com.docker.compose.service=openemr" \
                          --format '{{.ID}}' | head -n1)
          if [[ -z "${id_a}" || -z "${id_b}" || "${id_a}" = "${id_b}" ]]; then
              echo "FAIL: container ids not distinct (a='${id_a}' b='${id_b}')"
              docker ps -a
              exit 1
          fi
          echo "two distinct openemr containers: a=${id_a:0:12} b=${id_b:0:12}"

      - name: worktree exec multi-a + multi-b route to their own containers
        working-directory: openemr
        run: |
          # Two different sentinels, one per branch. If exec ever crossed
          # streams (routed multi-a's exec into multi-b's container or vice
          # versa), the wrong sentinel would come back.
          sent_a="multi-a-sentinel-$$"
          sent_b="multi-b-sentinel-$$"
          out_a=$(openemr-cmd worktree exec multi-a e "echo ${sent_a}")
          out_b=$(openemr-cmd worktree exec multi-b e "echo ${sent_b}")
          echo "multi-a stdout: ${out_a}"
          echo "multi-b stdout: ${out_b}"
          grep -Fqx "${sent_a}" <<< "${out_a}" \
              || { echo "FAIL: multi-a exec did not return its sentinel"; exit 1; }
          grep -Fqx "${sent_b}" <<< "${out_b}" \
              || { echo "FAIL: multi-b exec did not return its sentinel"; exit 1; }
          # And the OTHER sentinel must NOT appear in either output.
          if grep -Fq "${sent_b}" <<< "${out_a}" || grep -Fq "${sent_a}" <<< "${out_b}"; then
              echo "FAIL: exec cross-talk between worktrees"
              exit 1
          fi

      - name: Down + remove BOTH worktrees
        working-directory: openemr
        run: |
          openemr-cmd worktree down multi-a --keep-volumes
          openemr-cmd worktree down multi-b --keep-volumes
          # Pre-chown both worktree dirs (same A5 workaround as the
          # lifecycle job — the A5 contract test runs there, not here).
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/openemr-wt-multi-a"
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/openemr-wt-multi-b"
          echo y | openemr-cmd worktree remove multi-a
          echo y | openemr-cmd worktree remove multi-b

      - name: Verify both state entries cleaned
        working-directory: openemr
        run: |
          if jq -e '."multi-a" or ."multi-b"' .worktrees.json 2>/dev/null; then
              echo "FAIL: a state entry remains"
              cat .worktrees.json
              exit 1
          fi
          for dir in openemr-wt-multi-a openemr-wt-multi-b; do
              if [[ -d "${{ github.workspace }}/${dir}" ]]; then
                  echo "FAIL: ${dir} still on disk"
                  exit 1
              fi
          done
          for proj in openemr-multi-a openemr-multi-b; do
              rem=$(docker volume ls -q --filter "name=${proj}_" | wc -l)
              if [[ "${rem}" -ne 0 ]]; then
                  echo "FAIL: ${rem} volumes left for ${proj}"
                  docker volume ls --filter "name=${proj}_"
                  exit 1
              fi
          done
          echo "both stacks cleaned"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== .worktrees.json ====="
          cat openemr/.worktrees.json 2>/dev/null || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          for c in openemr-multi-a-openemr-1 openemr-multi-b-openemr-1 \
                   openemr-multi-a-mysql-1   openemr-multi-b-mysql-1; do
              echo "===== ${c} logs (last 200) ====="
              docker logs "${c}" --tail 200 2>/dev/null || true
          done

  nonworktree-lifecycle-e2e:
    # The plain non-worktree workflow: run openemr-cmd from
    # openemr/docker/development-easy and let it manage the standard
    # compose project (project name = dir name = development-easy).
    # No -d flag — the container is auto-detected via
    # `docker ps --filter name=openemr[_\-]1` (matches the substring
    # 'openemr-1' inside 'development-easy-openemr-1').
    name: e2e — standard stack — up → healthy → exec → down
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      - name: openemr-cmd up (from openemr/docker/development-easy)
        working-directory: openemr/docker/development-easy
        run: |
          # Top-level `openemr-cmd up` calls `docker compose up -d` against
          # the compose file in the cwd. Container names are project-name-
          # prefixed (project = dir name = 'development-easy'); the openemr
          # container is named development-easy-openemr-1.
          openemr-cmd up

      - name: Wait for development-easy-openemr-1 to become healthy
        run: |
          cname="development-easy-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy)
                echo "container reported healthy"
                exit 0
                ;;
              unhealthy)
                echo "FAIL: container reported unhealthy"
                docker logs "${cname}" --tail 200
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "FAIL: container never became healthy in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: HTTP smoke (openemr responds on default port 8300)
        run: |
          # Standard easy stack: WT_HTTP_PORT defaults to 8300 (no .env
          # set, so the variable defaults from the compose file kick in).
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8300/" || true)
            echo "[${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: openemr did not respond with 2xx/3xx on port 8300"
          exit 1

      - name: "openemr-cmd e (auto-detected container): exec sentinel"
        working-directory: openemr/docker/development-easy
        run: |
          # No -d: the script auto-detects the openemr container via
          # `docker ps --filter name=openemr[_\-]1`, which substring-
          # matches development-easy-openemr-1. `e <cmd>` runs
          # `docker exec -i <id> sh -c "<cmd>"`.
          sentinel="non-worktree-exec-sentinel-$$-$(date +%s)"
          out=$(openemr-cmd e "echo ${sentinel}")
          echo "exec stdout: ${out}"
          if ! grep -Fqx "${sentinel}" <<< "${out}"; then
              echo "FAIL: exec stdout did not contain the sentinel"
              exit 1
          fi

      - name: "openemr-cmd dn (docker-names): lists running stack"
        working-directory: openemr/docker/development-easy
        run: |
          # `dn` (docker-names) lists running + other-status containers.
          # Should include at least the openemr + mysql containers and
          # print the expected banners.
          out=$(openemr-cmd dn 2>&1)
          echo "${out}"
          grep -Fq "Running Docker Names" <<< "${out}" \
              || { echo "FAIL: missing 'Running Docker Names' banner"; exit 1; }
          grep -Fq "development-easy-openemr-1" <<< "${out}" \
              || { echo "FAIL: openemr container not listed by dn"; exit 1; }

      - name: "openemr-cmd prek --version: pre-commit runs inside the container"
        working-directory: openemr/docker/development-easy
        run: |
          # prek dispatches to docker exec -w /var/www/localhost/htdocs/openemr
          # -i <id> sh -c '<inline>' sh --version. The inline script falls
          # into the pass-through branch (no config substitution) and runs
          # `exec pre-commit --version`. Validates the in-container Python
          # pre-commit toolchain is available.
          out=$(openemr-cmd prek --version 2>&1)
          echo "${out}"
          # pre-commit prints "pre-commit X.Y.Z" — we just check the prefix.
          grep -Eq "^pre-commit " <<< "${out}" \
              || { echo "FAIL: 'pre-commit X.Y.Z' not in prek --version output"; exit 1; }

      - name: openemr-cmd down -v (deletes containers + volumes)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd down

      - name: Verify hygiene (no project containers, no project volumes)
        run: |
          remaining_c=$(docker ps -aq --filter "label=com.docker.compose.project=development-easy" | wc -l)
          if [[ "${remaining_c}" -ne 0 ]]; then
              echo "FAIL: ${remaining_c} containers left from development-easy project:"
              docker ps -a --filter "label=com.docker.compose.project=development-easy"
              exit 1
          fi
          remaining_v=$(docker volume ls -q --filter "label=com.docker.compose.project=development-easy" | wc -l)
          if [[ "${remaining_v}" -ne 0 ]]; then
              echo "FAIL: ${remaining_v} volumes left from development-easy project:"
              docker volume ls --filter "label=com.docker.compose.project=development-easy"
              exit 1
          fi
          echo "standard stack cleaned"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          echo "===== openemr container logs (last 500) ====="
          docker logs development-easy-openemr-1 --tail 500 2>/dev/null || true
          echo "===== mysql container logs (last 200) ====="
          docker logs development-easy-mysql-1 --tail 200 2>/dev/null || true

  functional-roundtrip-e2e:
    # Tests the data-flow contract between openemr-cmd's CLI and the
    # in-container /root/devtools scripts: import-random-patients,
    # backup, restore, and the capsule copy commands. The script's
    # internals are openemr core's concern (covered there in
    # tests/bats/docker/release/); this job confirms that openemr-cmd's
    # assumed interface still matches what /root/devtools provides.
    #
    # End-to-end shape (mirrors a real ops flow: load demo data,
    # generate test patients, snapshot, restore on a clean machine):
    #   stack-A: up → wait healthy → confirm patient count = 0
    #          → drid (dev-reset-install-demodata) → wait healthy
    #          → capture demo_count
    #          → irp 3 → confirm count = demo_count + 3
    #          → bs roundtrip-snap → verify /snapshots/roundtrip-snap exists
    #          → gc roundtrip-snap /tmp/host → verify file on host
    #          → down -v → CLEAN SLATE (volumes gone)
    #   stack-B: up → wait healthy → confirm patient count = 0 (fresh DB)
    #          → pc /tmp/host/roundtrip-snap → verify back in container
    #          → rs roundtrip-snap → confirm count is BACK TO demo_count + 3
    #          → down -v
    #
    # If openemr core ever changes the /root/devtools interface in a
    # way that breaks openemr-cmd's assumptions (e.g. backup grows a
    # mandatory --format flag, restore changes its arg order), this
    # job fails — catching the regression before users hit it at
    # restore-from-backup time, which is the worst possible time.
    name: e2e — functional round-trip — irp + bs + gc + pc + rs
    runs-on: ubuntu-22.04
    # Two full healthy-waits + irp + bs + restore + db verification.
    # Restart (stack-B) is from a clean slate, so as slow as first boot.
    timeout-minutes: 50
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      # ---- stack-A: bring up, insert patients, snapshot, capsule out ----

      - name: stack-A — openemr-cmd up
        working-directory: openemr/docker/development-easy
        run: openemr-cmd up

      - name: stack-A — wait healthy
        run: |
          cname="development-easy-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[A ${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy) echo "stack-A healthy"; exit 0 ;;
              unhealthy) echo "FAIL: unhealthy"; docker logs "${cname}" --tail 200; exit 1 ;;
            esac
            sleep 10
          done
          echo "FAIL: stack-A never healthy in ~15 min"
          docker ps -a; docker logs "${cname}" --tail 500
          exit 1

      - name: stack-A — baseline patient_data count is 0 (fresh DB)
        working-directory: openemr/docker/development-easy
        run: |
          # Use openemr-cmd e to run the mysql client INSIDE the openemr
          # container (which has the mariadb client installed) against the
          # mysql container at the docker-network alias 'mysql'. Credentials
          # come from the easy compose file: MYSQL_USER=openemr / PASS=openemr.
          # -sN: silent + skip headers → just the number.
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-A baseline patient_data count: '${count}'"
          [[ "${count}" = "0" ]] || { echo "FAIL: expected baseline count 0, got '${count}'"; exit 1; }

      - name: stack-A — drid (dev-reset-install-demodata)
        working-directory: openemr/docker/development-easy
        run: |
          # drid runs /root/devtools dev-reset-install-demodata which wipes
          # and reinstalls openemr WITH the demo data set. Mirrors the
          # common ops flow: load demo data, then layer additional test
          # data on top, snapshot the whole thing for later restoration.
          # The handler also restarts the couchdb container post-install.
          openemr-cmd drid

      - name: stack-A — wait healthy after drid (couchdb was restarted)
        run: |
          # drid restarts the couchdb container; give the stack a moment
          # to settle before re-querying. The openemr container itself
          # is not restarted by drid, but a re-confirm is cheap insurance.
          cname="development-easy-openemr-1"
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[A-post-drid ${i}/30 @ $((i*5))s] status=${status}"
            [[ "${status}" = "healthy" ]] && exit 0
            sleep 5
          done
          echo "FAIL: openemr did not return to healthy within 2.5 min after drid"
          docker ps -a
          exit 1

      - name: stack-A — capture demo_count after drid (real-life starting point)
        working-directory: openemr/docker/development-easy
        run: |
          demo_count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-A post-drid demo patient_data count: '${demo_count}'"
          [[ -n "${demo_count}" ]] && [[ "${demo_count}" =~ ^[0-9]+$ ]] \
              || { echo "FAIL: could not capture numeric demo_count; got '${demo_count}'"; exit 1; }
          [[ "${demo_count}" -gt 0 ]] \
              || { echo "FAIL: drid produced no demo patients (count=0)"; exit 1; }
          # Pass demo_count through to subsequent steps via $GITHUB_ENV.
          echo "DEMO_COUNT=${demo_count}" >> "${GITHUB_ENV}"
          echo "EXPECTED_AFTER_IRP=$((demo_count + 3))" >> "${GITHUB_ENV}"

      - name: stack-A — irp 3 (layer 3 random patients on top of demo data)
        working-directory: openemr/docker/development-easy
        run: |
          # irp sets ENV_VAR=OPENEMR_ENABLE_CCDA_IMPORT=1 and dispatches
          # /root/devtools import-random-patients 3. The devtools script
          # is openemr core's; we just confirm it runs to success and
          # actually persists patients on top of the demo set.
          openemr-cmd irp 3

      - name: stack-A — confirm patient_data count is demo_count + 3
        working-directory: openemr/docker/development-easy
        run: |
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-A post-irp patient_data count: '${count}' (expected ${EXPECTED_AFTER_IRP} = demo ${DEMO_COUNT} + 3)"
          [[ "${count}" = "${EXPECTED_AFTER_IRP}" ]] \
              || { echo "FAIL: expected ${EXPECTED_AFTER_IRP} patients after irp 3, got '${count}'"; exit 1; }

      - name: stack-A — bs roundtrip-snap (create backup)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd bs roundtrip-snap

      - name: stack-A — verify /snapshots/roundtrip-snap exists in container
        working-directory: openemr/docker/development-easy
        run: |
          # /root/devtools backup writes to /snapshots/<name>; the exact
          # filename layout (e.g. .tgz suffix or directory tree) is
          # openemr core's concern. We just check SOMETHING shows up
          # under /snapshots that matches the name we passed.
          out=$(openemr-cmd e "ls -la /snapshots/" 2>&1)
          echo "${out}"
          grep -q "roundtrip-snap" <<< "${out}" \
              || { echo "FAIL: no entry named 'roundtrip-snap' in /snapshots/"; exit 1; }

      - name: stack-A — gc roundtrip-snap → host /tmp
        working-directory: openemr/docker/development-easy
        run: |
          mkdir -p /tmp/capsule-host
          openemr-cmd gc roundtrip-snap /tmp/capsule-host
          # File on host — again, name-match only (file vs dir is core's call).
          ls -la /tmp/capsule-host/
          ls /tmp/capsule-host/ | grep -q "roundtrip-snap" \
              || { echo "FAIL: capsule not copied to host"; exit 1; }

      - name: stack-A — down -v (clean slate)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd down

      # ---- stack-B: fresh up, copy capsule back in, restore, verify ----

      - name: stack-B — fresh openemr-cmd up (new volumes, empty DB)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd up

      - name: stack-B — wait healthy
        run: |
          cname="development-easy-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[B ${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy) echo "stack-B healthy"; exit 0 ;;
              unhealthy) echo "FAIL: unhealthy"; docker logs "${cname}" --tail 200; exit 1 ;;
            esac
            sleep 10
          done
          echo "FAIL: stack-B never healthy in ~15 min"
          docker ps -a; docker logs "${cname}" --tail 500
          exit 1

      - name: stack-B — confirm patient_data count is 0 (fresh DB, no leakage)
        working-directory: openemr/docker/development-easy
        run: |
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-B baseline patient_data count: '${count}'"
          # If this is non-zero, the down -v didn't actually delete volumes
          # (or named volumes survived) — either way it'd invalidate the
          # restore test by leaving the 3 patients from stack-A in place.
          [[ "${count}" = "0" ]] || { echo "FAIL: expected 0 patients on fresh stack-B, got '${count}'"; exit 1; }

      - name: stack-B — pc /tmp/capsule-host/<file> (copy capsule back in)
        working-directory: openemr/docker/development-easy
        run: |
          # gc may have produced a file OR a directory named roundtrip-snap.
          # pc expects a file argument; if gc gave us a dir, tar it up first.
          src=/tmp/capsule-host/roundtrip-snap
          if [[ -d "${src}" ]]; then
              tar czf "${src}.tgz" -C /tmp/capsule-host roundtrip-snap
              src="${src}.tgz"
          fi
          openemr-cmd pc "${src}"
          # Verify it landed in /snapshots/.
          openemr-cmd e "ls -la /snapshots/" | grep -q "roundtrip-snap" \
              || { echo "FAIL: capsule not copied back into container"; exit 1; }

      - name: stack-B — rs roundtrip-snap (restore from capsule)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd rs roundtrip-snap

      - name: stack-B — confirm patient_data count is back to demo_count + 3 (restore worked)
        working-directory: openemr/docker/development-easy
        run: |
          # The headline assertion: after rs, the demo patients (loaded in
          # stack-A via drid) PLUS the 3 random patients (added via irp)
          # are all back in stack-B's previously-empty DB. Proves the
          # capsule really contained the data AND restore actually
          # restored it — the full ops flow: demo + extra → backup →
          # different machine → restore → same dataset.
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-B post-restore patient_data count: '${count}' (expected ${EXPECTED_AFTER_IRP} = demo ${DEMO_COUNT} + 3)"
          [[ "${count}" = "${EXPECTED_AFTER_IRP}" ]] \
              || { echo "FAIL: expected ${EXPECTED_AFTER_IRP} patients after restore, got '${count}'"; exit 1; }
          echo "data-flow round-trip OK: drid + irp 3 → bs → gc → fresh stack → pc → rs → patient count preserved"

      - name: stack-B — down -v (final cleanup)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd down

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          echo "===== /tmp/capsule-host listing ====="
          ls -la /tmp/capsule-host/ 2>/dev/null || true
          echo "===== openemr container logs (last 500) ====="
          docker logs development-easy-openemr-1 --tail 500 2>/dev/null || true
          echo "===== mysql container logs (last 200) ====="
          docker logs development-easy-mysql-1 --tail 200 2>/dev/null || true

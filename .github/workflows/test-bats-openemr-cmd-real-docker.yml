name: openemr-cmd e2e (real docker)

# Tier 2 of the openemr-cmd test coverage roadmap. Unlike the hermetic
# bats suite (test-bats-openemr-cmd.yml), this workflow exercises
# openemr-cmd against a real openemr/openemr image. Five parallel jobs:
#   - worktree-lifecycle-e2e: full worktree lifecycle on a single
#     worktree — add → exec → set-env refusal → down/up restart →
#     list status → regen → set-env env-switch (easy → easy-light) →
#     auto-chown-driven remove. Covers all the user-facing worktree
#     operations against a real running stack.
#   - worktree-multi-concurrent-e2e: three worktrees on three distinct
#     envs (easy / easy-light / easy-redis) running side-by-side,
#     distinct ports + compose projects, exec routes each to its own
#     container (no cross-talk). Also gives easy-redis its only e2e
#     coverage in this workflow.
#   - nonworktree-lifecycle-e2e: the plain `openemr-cmd up` / `down`
#     path against the standard openemr/docker/development-easy stack
#     (no worktree). Confirms top-level lifecycle, container auto-
#     detection, exec via auto-detected id, dn admin command, and
#     prek-in-container against a real running stack.
#   - functional-roundtrip-e2e: the data-flow contract between
#     openemr-cmd and the in-container `/root/devtools` scripts —
#     drid loads demo data, irp adds random patients, bs produces a
#     real snapshot, gc+pc shuttle the capsule out and back in, rs
#     restores data on a FRESH stack. Catches cross-repo contract
#     drift (openemr-cmd's CLI assumes a particular /root/devtools
#     interface; this job confirms the in-container scripts still
#     match it end-to-end).
#   - prek-workflow-e2e: the prek-install host-hook contract end to
#     end. Stands up a worktree, runs `openemr-cmd prek-install`,
#     then drives real `git commit` against the worktree to confirm
#     each hook stage fires through the openemr-cmd shim:
#     conventional-commits rejects a bad message (commit-msg stage),
#     codespell rejects a typo (pre-commit stage), and a clean
#     change + good message commits successfully (both stages pass).
#     Validates the actual user flow — `git commit` triggering the
#     installed hooks — rather than invoking the hook scripts by
#     hand, so a regression in the shim, hooks-dir resolution, or
#     cwd-aware container routing surfaces here.
#
# Cost: ~10-20 min per job for the lifecycle / non-worktree / prek
# jobs; the multi-concurrent job is ~25-35 min (three parallel
# stacks); the functional round-trip job is heaviest at ~30-40 min
# (two sequential stack startups). All five run in parallel on
# separate runners, so wall time is bounded by the slowest. Runs on
# every PR that touches openemr-cmd or this workflow file — slower
# PR cycle is the deliberate trade for catching regressions before
# merge rather than after. Also runs once daily on master (see
# schedule trigger below) to catch upstream drift between PRs.

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/test-bats-openemr-cmd-real-docker.yml'
      - 'utilities/openemr-cmd/openemr-cmd'
      - 'utilities/openemr-cmd/openemr-cmd-h'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/test-bats-openemr-cmd-real-docker.yml'
      - 'utilities/openemr-cmd/openemr-cmd'
      - 'utilities/openemr-cmd/openemr-cmd-h'
  # Daily run on the default branch to catch upstream drift that the
  # path-filtered push/pull_request triggers miss:
  #   - openemr/openemr master rewrites the /root/devtools interface
  #     (the kind of cross-repo contract drift that produced #832 /
  #     openemr#12632)
  #   - openemr container image republish (apache uid, alpine version,
  #     pre-commit toolchain)
  #   - GitHub-hosted runner image updates (docker daemon, jq, etc.)
  # 06:17 UTC = ~1am ET / ~7am CET — quiet for both US and EU. The
  # off-the-minute (17) avoids the cron-stampede at minute :00 across
  # GH Actions globally. Public-repo runners are unmetered, so the
  # 5-job parallel run is free; only cost is reviewer attention on
  # genuine upstream-drift failures.
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

# Read-only GITHUB_TOKEN — the workflow only clones public repos, pulls a
# public image, and runs containers locally; no write surfaces touched.
permissions:
  contents: read

# On PR pushes: cancel any in-flight run for the same ref so the new SHA's
# workflow registers as a check immediately. This keeps the All Checks
# Passed rollup honest — without it, a queued workflow doesn't register
# its jobs as checks on the new SHA, and the rollup (which waits for
# whatever checks exist) goes green prematurely. On master pushes: keep
# the in-flight run so sequential master history isn't lost. Matches the
# pattern in vendored-contracts-self-test.yml.
#
# Cross-run docker daemon contention isn't a concern here: each workflow
# run gets its own ephemeral GitHub-hosted runner with its own daemon.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  worktree-lifecycle-e2e:
    name: e2e — full worktree lifecycle (add → restart → set-env → regen → auto-chown remove)
    runs-on: ubuntu-22.04
    # 45 min to absorb three healthy-poll windows (initial add --start,
    # post-restart, post-set-env-switch to easy-light) plus the new
    # list/regen/auto-chown steps. In practice the second + third
    # healthy waits are fast (~3-5 min) since the base layer is cached,
    # but each is bounded at 15.
    timeout-minutes: 45
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          # --version exits 14 by design (VERSION_EXIT_CODE); don't fail the step.
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          realpath --version | head -1
          df -h /

      - name: worktree add test-e2e -b --base master --start
        working-directory: openemr
        env:
          # --base master uses the local commit we just cloned, skipping the
          # canonical-URL fetch (the fetch behavior is covered by the
          # hermetic bats suite; this workflow is about the docker side).
          WT_CANONICAL_URL: file://${{ github.workspace }}/openemr
        run: |
          openemr-cmd worktree add test-e2e -b --base master --start
          openemr-cmd worktree list

      - name: Wait for openemr container to become healthy
        run: |
          # Compose project naming: openemr-<slug>; service: openemr; replica: 1.
          cname="openemr-test-e2e-openemr-1"
          echo "polling docker inspect for ${cname} health (healthcheck has start_period: 3m)..."
          # The openemr healthcheck has start_period: 3m and start_interval: 10s,
          # so the earliest "healthy" can appear is around 10s into the run, but
          # in practice MySQL init + composer install + sites bootstrap push it
          # to several minutes. Poll for up to ~15 min.
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy)
                echo "container reported healthy"
                exit 0
                ;;
              unhealthy)
                echo "FAIL: container reported unhealthy"
                docker logs "${cname}" --tail 200
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "FAIL: container never became healthy in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: HTTP smoke (openemr responds on port 8301)
        run: |
          # WT_HTTP_PORT = 8300 + offset (=1 for first worktree).
          # Once health is healthy, /meta/health/readyz returns 200; the
          # bare / serves the login redirect (302/303).
          for i in $(seq 1 12); do
            # --connect-timeout/--max-time keep one bad iteration from
            # eating the whole loop budget if the local TCP path is wedged.
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8301/" || true)
            echo "[${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: openemr did not respond with 2xx/3xx on port 8301"
          exit 1

      - name: worktree exec test-e2e e -- echo sentinel (resolves container by compose project label)
        working-directory: openemr
        run: |
          # cmd_worktree_exec resolves the openemr container via
          #   --filter label=com.docker.compose.project=openemr-test-e2e
          #   --filter label=com.docker.compose.service=openemr
          # then re-invokes openemr-cmd with -d <container_id>, which runs
          # `docker exec -i <id> sh -c "<command>"` for the `e` subcommand.
          # We grep stdout for a fixed sentinel so the assertion fails loudly
          # if exec ever started routing to a different container or silently
          # short-circuiting.
          sentinel="openemr-cmd-exec-e2e-sentinel-$$-$(date +%s)"
          out=$(openemr-cmd worktree exec test-e2e e "echo ${sentinel}")
          echo "exec stdout: ${out}"
          if ! grep -Fqx "${sentinel}" <<< "${out}"; then
              echo "FAIL: exec stdout did not contain the sentinel"
              exit 1
          fi

      - name: "worktree set-env while stack is running (expected: refused with 'Stack must be down')"
        working-directory: openemr
        run: |
          # cmd_worktree_set_env checks `docker compose ps -aq` for running
          # containers; if any are up, it dies with "Stack must be down
          # before switching env". Bats covers this hermetically; here we
          # confirm the contract holds against a real running stack.
          set +e
          openemr-cmd worktree set-env test-e2e easy-light > /tmp/setenv-out.txt 2>&1
          rc=$?
          set -e
          cat /tmp/setenv-out.txt
          if [[ "${rc}" = "0" ]]; then
              echo "FAIL: set-env unexpectedly succeeded against a running stack"
              exit 1
          fi
          grep -q "Stack must be down" /tmp/setenv-out.txt \
              || { echo "FAIL: refusal message not surfaced"; exit 1; }
          # State env unchanged.
          current_env=$(jq -r '."test-e2e".env' .worktrees.json)
          [[ "${current_env}" = "easy" ]] \
              || { echo "FAIL: env field changed to '${current_env}' despite refusal"; exit 1; }

      - name: worktree down test-e2e --keep-volumes (first cycle)
        working-directory: openemr
        run: openemr-cmd worktree down test-e2e --keep-volumes

      - name: worktree up test-e2e (restart with preserved volumes)
        working-directory: openemr
        run: |
          # Down --keep-volumes preserved the mysql data volume + the openemr
          # state. Bring the stack back up and confirm it returns to healthy.
          # Volume-preserving restart is the basis for set-env, prek edits,
          # backups, and dev iteration; pinning it here catches regressions
          # where down + up would silently rebuild empty state.
          openemr-cmd worktree up test-e2e

      - name: Wait for openemr container to become healthy (second cycle)
        run: |
          cname="openemr-test-e2e-openemr-1"
          # Restart is typically faster than first boot since composer/mysql
          # init is already done, but the healthcheck still has its 3m
          # start_period. Same 15-min budget as the first wait.
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] (restart) status=${status}"
            case "${status}" in
              healthy)
                echo "container reported healthy after restart"
                exit 0
                ;;
              unhealthy)
                echo "FAIL: container reported unhealthy after restart"
                docker logs "${cname}" --tail 200
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "FAIL: container never returned to healthy after restart in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: HTTP smoke after restart (still responds on port 8301)
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8301/" || true)
            echo "[restart ${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: openemr did not respond on port 8301 after restart"
          exit 1

      - name: "worktree list: confirms test-e2e shows status=running"
        working-directory: openemr
        run: |
          # cmd_worktree_list walks state, runs `compose ps --filter
          # status=running` per entry, and renders STATUS=running for any
          # whose openemr service is up. With test-e2e currently up after
          # the restart cycle, the rendered row must say `running`. Quick
          # assertion of the status detection path against a real stack.
          out=$(openemr-cmd worktree list 2>&1)
          echo "${out}"
          # Match a line that has the test-e2e branch + status running on
          # the same line (column-aligned by printf).
          grep -E '^test-e2e[[:space:]]+.*[[:space:]]running[[:space:]]' <<< "${out}" \
              || { echo "FAIL: 'test-e2e' not listed with status=running"; exit 1; }

      - name: worktree down test-e2e (purge easy volumes before env switch)
        working-directory: openemr
        run: |
          # Plain `down` (no --keep-volumes) purges easy's volumes before
          # we switch to easy-light. set-env doesn't migrate volumes
          # across env switches — the easy-only mailpit/couchdb volumes
          # would be orphaned otherwise and the final hygiene check
          # would catch them. The restart-with-preserved-volumes path
          # was already validated upstream in this job (the second
          # healthy + smoke after `worktree up test-e2e`); we don't
          # need those volumes anymore.
          openemr-cmd worktree down test-e2e

      - name: "worktree list: confirms test-e2e shows status=none"
        working-directory: openemr
        run: |
          # After `worktree down --keep-volumes` the containers are
          # REMOVED (only volumes preserved); compose ps -aq returns
          # empty, so cmd_worktree_list renders status=none — not
          # `stopped`. `stopped` is what you'd get from `worktree stop`
          # (docker compose stop, which preserves containers); we don't
          # use that path in this job. set-env's "stack must be down"
          # check requires `ps -aq` empty, so `none` is exactly the
          # state we need next.
          out=$(openemr-cmd worktree list 2>&1)
          echo "${out}"
          grep -E '^test-e2e[[:space:]]+.*[[:space:]]none[[:space:]]' <<< "${out}" \
              || { echo "FAIL: 'test-e2e' not listed with status=none"; exit 1; }

      - name: One-shot chown back to runner (enables host-side regen + set-env)
        run: |
          # openemr's container startup chowned the whole bind mount to
          # apache during install, so host-side host-uid operations
          # (regen writing .env, set-env creating new env dir files)
          # would fail with EACCES. Chown back to runner once now (stack
          # is down, no race). The auto-chown step on the eventual
          # `worktree remove` (when stack is back up) will handle any
          # further apache-writes between then and now.
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/openemr-wt-test-e2e"

      - name: "worktree regen: rewrites a stomped .env back to canonical contents"
        working-directory: openemr
        run: |
          # regen calls wt_write_env + wt_write_override against the
          # current state entry — useful when the user manually edits
          # these files or they get out of sync. Stomp the .env, regen,
          # confirm restored byte-for-byte.
          env_file="${{ github.workspace }}/openemr-wt-test-e2e/docker/development-easy/.env"
          [[ -f "${env_file}" ]] || { echo "FAIL: .env missing before stomp"; exit 1; }
          cp "${env_file}" /tmp/test-e2e-env.before
          echo "STOMPED_BY_E2E=1" > "${env_file}"
          openemr-cmd worktree regen test-e2e
          # The .env-writer is deterministic given (branch, offset, env)
          # so regen output equals the pre-stomp snapshot.
          if ! diff -u /tmp/test-e2e-env.before "${env_file}"; then
              echo "FAIL: regen did not restore .env to original contents"
              exit 1
          fi
          echo "regen restored .env correctly"

      - name: "worktree set-env: switch test-e2e from easy to easy-light (with stack down)"
        working-directory: openemr
        run: |
          # set-env requires status=none/stopped (the bats-covered refusal
          # we already tested upstream). With the stack down, the switch
          # should succeed and update the state's env field + rewrite the
          # compose files for the new env.
          openemr-cmd worktree set-env test-e2e easy-light
          # State env updated.
          new_env=$(jq -r '."test-e2e".env' .worktrees.json)
          [[ "${new_env}" = "easy-light" ]] \
              || { echo "FAIL: state env still '${new_env}' after set-env easy-light"; exit 1; }
          # easy-light's compose files now exist in the worktree.
          [[ -f "${{ github.workspace }}/openemr-wt-test-e2e/docker/development-easy-light/.env" ]] \
              || { echo "FAIL: easy-light/.env missing after set-env"; exit 1; }
          [[ -f "${{ github.workspace }}/openemr-wt-test-e2e/docker/development-easy-light/docker-compose.override.yml" ]] \
              || { echo "FAIL: easy-light/override missing after set-env"; exit 1; }

      - name: worktree up test-e2e (bring up the new easy-light env)
        working-directory: openemr
        run: openemr-cmd worktree up test-e2e

      - name: Wait for openemr container to become healthy on easy-light
        run: |
          # The container is recreated under the new compose project — same
          # name pattern (openemr-test-e2e-openemr-1) since compose project
          # name is derived from the worktree slug, not the env.
          cname="openemr-test-e2e-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[easy-light ${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy) echo "healthy on easy-light"; exit 0 ;;
              unhealthy) echo "FAIL: unhealthy on easy-light"; docker logs "${cname}" --tail 200; exit 1 ;;
            esac
            sleep 10
          done
          echo "FAIL: easy-light stack never became healthy in ~15 min"
          docker ps -a
          exit 1

      - name: HTTP smoke after env-switch (still responds on port 8301)
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8301/" || true)
            echo "[easy-light ${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: easy-light openemr did not respond on port 8301"
          exit 1

      - name: "worktree remove (container still running → auto-chown handles root files)"
        working-directory: openemr
        run: |
          # Stack is up. The container has written root-owned files into
          # the bind mount during startup/install. With the auto-chown step
          # added in openemr-devops#833, `worktree remove` should now
          # detect the running container, exec into it as root to chown
          # the bind mount back to the host uid, then proceed with the
          # destructive ops — without the user needing a manual
          # `sudo chown -R` on the host. If the auto-chown ever breaks,
          # the probe would fire here and remove would fail with the
          # writability hint instead of succeeding.
          echo y | openemr-cmd worktree remove test-e2e 2>&1 | tee /tmp/remove-out.txt
          # Confirm the auto-chown step ran (banner present).
          grep -q "Auto-chowning bind mount via container" /tmp/remove-out.txt \
              || { echo "FAIL: auto-chown banner missing — script may have skipped the step"; exit 1; }
          # Remove succeeded (no probe-refused hint).
          if grep -q "is not writable by you" /tmp/remove-out.txt; then
              echo "FAIL: probe fired despite container being available for auto-chown"
              exit 1
          fi

      - name: Verify state hygiene
        working-directory: openemr
        run: |
          # State entry should be gone from .worktrees.json.
          if jq -e '."test-e2e"' .worktrees.json 2>/dev/null; then
            echo "FAIL: state entry still present"
            cat .worktrees.json
            exit 1
          fi
          # Worktree dir should be gone from WORKTREE_PARENT (= parent of openemr/).
          if [ -d "${{ github.workspace }}/openemr-wt-test-e2e" ]; then
            echo "FAIL: worktree dir still on disk"
            exit 1
          fi
          # Compose project's volumes should be gone (remove without
          # --keep-volumes calls `down --volumes` under the hood).
          remaining=$(docker volume ls -q --filter "name=openemr-test-e2e_" | wc -l)
          if [ "${remaining}" -ne 0 ]; then
            echo "FAIL: ${remaining} compose volumes left over:"
            docker volume ls --filter "name=openemr-test-e2e_"
            exit 1
          fi
          echo "state clean"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== .worktrees.json ====="
          cat openemr/.worktrees.json 2>/dev/null || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          echo "===== openemr container logs (last 500) ====="
          docker logs openemr-test-e2e-openemr-1 --tail 500 2>/dev/null || true
          echo "===== mysql container logs (last 200) ====="
          docker logs openemr-test-e2e-mysql-1 --tail 200 2>/dev/null || true

  worktree-multi-concurrent-e2e:
    # Three worktrees on the same primary repo, started one after the other,
    # left running in parallel — one per supported env (easy / easy-light /
    # easy-redis). Verifies that:
    #   - offset allocation picks distinct ports across stacks (8301/02/03)
    #   - state lock serializes the three adds without dropping any entry
    #   - distinct compose project names keep the docker stacks isolated
    #     (no container name collisions, no port collisions, no volume
    #     bleed-through across projects)
    #   - every env variant supports the worktree lifecycle (the lifecycle
    #     job above tests easy → easy-light; this job exercises easy-redis
    #     as well, which the lifecycle job never touches)
    # All three stacks run concurrently to also pressure the docker daemon
    # / resource allocator under realistic developer-workflow load.
    name: e2e — three concurrent worktrees (one per env), distinct stacks
    runs-on: ubuntu-22.04
    # Bumped from 30 → 40 to absorb the third stack's parallel start.
    # Healthy-poll budget per stack is ~15 min and they boot in parallel,
    # but the docker daemon serializes layer pulls and the runner shares
    # CPU/disk across all three composer-install passes.
    timeout-minutes: 40
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      - name: worktree add multi-easy + multi-light + multi-redis (one per env, all --start)
        working-directory: openemr
        env:
          WT_CANONICAL_URL: file://${{ github.workspace }}/openemr
        run: |
          # Three stacks side-by-side, one per supported env. The state lock
          # forces these to serialize anyway; the concurrency assertion is
          # that each ends up with its own offset/dir/project entry and
          # all three stacks come up alongside one another. Covers every
          # env variant (easy / easy-light / easy-redis) in this one job;
          # the lifecycle + non-worktree + functional jobs all use easy.
          openemr-cmd worktree add multi-easy  -b --base master --start --env easy
          openemr-cmd worktree add multi-light -b --base master --start --env easy-light
          openemr-cmd worktree add multi-redis -b --base master --start --env easy-redis
          openemr-cmd worktree list

      - name: State has all three entries with distinct offsets + envs
        working-directory: openemr
        run: |
          jq . .worktrees.json
          # All three entries present.
          jq -e '."multi-easy" and ."multi-light" and ."multi-redis"' .worktrees.json >/dev/null \
              || { echo "FAIL: missing state entry"; cat .worktrees.json; exit 1; }
          # Distinct offsets (proves wt_next_offset didn't hand out duplicates).
          oe=$(jq -r '."multi-easy".offset'  .worktrees.json)
          ol=$(jq -r '."multi-light".offset' .worktrees.json)
          or=$(jq -r '."multi-redis".offset' .worktrees.json)
          uniq_count=$(printf '%s\n%s\n%s\n' "${oe}" "${ol}" "${or}" | sort -u | wc -l)
          if [[ "${uniq_count}" -ne 3 ]]; then
              echo "FAIL: offsets not distinct (easy=${oe} light=${ol} redis=${or})"
              exit 1
          fi
          # Each entry pinned to its own env in state.
          [[ "$(jq -r '."multi-easy".env'  .worktrees.json)" = "easy"       ]] || { echo "FAIL: multi-easy env"; exit 1; }
          [[ "$(jq -r '."multi-light".env' .worktrees.json)" = "easy-light" ]] || { echo "FAIL: multi-light env"; exit 1; }
          [[ "$(jq -r '."multi-redis".env' .worktrees.json)" = "easy-redis" ]] || { echo "FAIL: multi-redis env"; exit 1; }
          echo "offsets: easy=${oe}, light=${ol}, redis=${or}"

      - name: Wait for ALL THREE openemr containers to become healthy
        run: |
          # All three stacks' openemr containers share the same healthcheck
          # contract (start_period: 3m). Poll all three up to ~15 min; bail
          # as soon as any reports unhealthy.
          cname_e="openemr-multi-easy-openemr-1"
          cname_l="openemr-multi-light-openemr-1"
          cname_r="openemr-multi-redis-openemr-1"
          for i in $(seq 1 90); do
            se=$(docker inspect --format='{{.State.Health.Status}}' "${cname_e}" 2>/dev/null || echo missing)
            sl=$(docker inspect --format='{{.State.Health.Status}}' "${cname_l}" 2>/dev/null || echo missing)
            sr=$(docker inspect --format='{{.State.Health.Status}}' "${cname_r}" 2>/dev/null || echo missing)
            echo "[${i}/90 @ $((i*10))s] easy=${se} light=${sl} redis=${sr}"
            if [[ "${se}" = "healthy" && "${sl}" = "healthy" && "${sr}" = "healthy" ]]; then
                echo "all three containers healthy"
                exit 0
            fi
            if [[ "${se}" = "unhealthy" || "${sl}" = "unhealthy" || "${sr}" = "unhealthy" ]]; then
                echo "FAIL: a container reported unhealthy"
                docker logs "${cname_e}" --tail 200 || true
                docker logs "${cname_l}" --tail 200 || true
                docker logs "${cname_r}" --tail 200 || true
                exit 1
            fi
            sleep 10
          done
          echo "FAIL: all three containers did not reach healthy in ~15 min"
          docker ps -a
          exit 1

      - name: HTTP smoke on all three ports (no cross-talk)
        working-directory: openemr
        run: |
          # Offsets 1/2/3 → ports 8301/8302/8303. Whichever offset jq
          # captured (insertion order is preserved by wt_next_offset
          # filling gaps), compute the port = 8300 + offset.
          oe=$(jq -r '."multi-easy".offset'  .worktrees.json)
          ol=$(jq -r '."multi-light".offset' .worktrees.json)
          or=$(jq -r '."multi-redis".offset' .worktrees.json)
          for entry in "easy:${oe}" "light:${ol}" "redis:${or}"; do
            label="${entry%%:*}"
            port=$((8300 + ${entry##*:}))
            ok=""
            for i in $(seq 1 12); do
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                  --connect-timeout 5 --max-time 10 \
                  "http://localhost:${port}/" || true)
              echo "[${label} :${port} ${i}/12] HTTP ${code}"
              case "${code}" in
                200|302|303) ok=1; break ;;
              esac
              sleep 5
            done
            [[ -n "${ok}" ]] || { echo "FAIL: ${label} (port ${port}) did not respond"; exit 1; }
          done
          # Cross-talk check: each compose project exposes a distinct
          # openemr container id. Confirms we have three real stacks,
          # not one serving three ports somehow.
          id_e=$(docker ps --filter "label=com.docker.compose.project=openemr-multi-easy"  --filter "label=com.docker.compose.service=openemr" --format '{{.ID}}' | head -n1)
          id_l=$(docker ps --filter "label=com.docker.compose.project=openemr-multi-light" --filter "label=com.docker.compose.service=openemr" --format '{{.ID}}' | head -n1)
          id_r=$(docker ps --filter "label=com.docker.compose.project=openemr-multi-redis" --filter "label=com.docker.compose.service=openemr" --format '{{.ID}}' | head -n1)
          uniq=$(printf '%s\n%s\n%s\n' "${id_e}" "${id_l}" "${id_r}" | sort -u | wc -l)
          if [[ -z "${id_e}" || -z "${id_l}" || -z "${id_r}" || "${uniq}" -ne 3 ]]; then
              echo "FAIL: container ids not all distinct (easy='${id_e}' light='${id_l}' redis='${id_r}')"
              docker ps -a
              exit 1
          fi
          echo "three distinct openemr containers: easy=${id_e:0:12} light=${id_l:0:12} redis=${id_r:0:12}"

      - name: worktree exec routes each branch to its own container
        working-directory: openemr
        run: |
          # Three different sentinels, one per branch. If exec ever crossed
          # streams (routed one branch's exec into another branch's
          # container), the wrong sentinel would come back.
          sent_e="multi-easy-sentinel-$$"
          sent_l="multi-light-sentinel-$$"
          sent_r="multi-redis-sentinel-$$"
          out_e=$(openemr-cmd worktree exec multi-easy  e "echo ${sent_e}")
          out_l=$(openemr-cmd worktree exec multi-light e "echo ${sent_l}")
          out_r=$(openemr-cmd worktree exec multi-redis e "echo ${sent_r}")
          echo "easy  stdout: ${out_e}"
          echo "light stdout: ${out_l}"
          echo "redis stdout: ${out_r}"
          grep -Fqx "${sent_e}" <<< "${out_e}" || { echo "FAIL: multi-easy did not return its sentinel"; exit 1; }
          grep -Fqx "${sent_l}" <<< "${out_l}" || { echo "FAIL: multi-light did not return its sentinel"; exit 1; }
          grep -Fqx "${sent_r}" <<< "${out_r}" || { echo "FAIL: multi-redis did not return its sentinel"; exit 1; }
          # No other branch's sentinel may appear in any output.
          for combo in "${sent_l}:${out_e}" "${sent_r}:${out_e}" \
                       "${sent_e}:${out_l}" "${sent_r}:${out_l}" \
                       "${sent_e}:${out_r}" "${sent_l}:${out_r}"; do
              wrong="${combo%%:*}"; output="${combo#*:}"
              if grep -Fq "${wrong}" <<< "${output}"; then
                  echo "FAIL: exec cross-talk — sentinel '${wrong}' appeared in unrelated output"
                  exit 1
              fi
          done

      - name: Pre-remove host-side chown (covers volume-shadowed mount-point dirs)
        run: |
          # #833's auto-chown via `docker exec` chowns files INSIDE the
          # bind mount, but it cannot reach the host-side dirs that
          # docker created as root when first mounting named volumes
          # OVER bind-mount paths (ccdaservice/node_modules,
          # ccdaservice/packages/oe-cqm-service/node_modules — both
          # volumes shadow worktree dirs). Those dirs persist on the
          # host owned by root; when `git worktree remove --force`
          # runs, the writability probe correctly catches them and
          # refuses to proceed.
          #
          # Fix: pre-emptively sudo chown each worktree dir before
          # remove. This handles both the volume-shadow case AND any
          # apache-uid-owned bind-mount files (the latter is what
          # auto-chown also handles; the two paths are complementary
          # but harmless overlap). The lifecycle job sidesteps this
          # by sudo-chowning between env switches (line ~325); multi-3
          # doesn't have a natural env-switch hook, so we do it here.
          #
          # Longer-term fix is the HOST_UID-passthrough work tracked
          # against the openemr container — once apache inside the
          # container adopts the runner's uid, the volume mount points
          # would be created with runner ownership in the first place.
          for dir in openemr-wt-multi-easy openemr-wt-multi-light openemr-wt-multi-redis; do
              sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/${dir}"
          done

      - name: Down + remove all three worktrees (auto-chown handles container-written files)
        working-directory: openemr
        run: |
          # Stacks still running → openemr-cmd's auto-chown step from
          # #833 fires before each compose down to handle any apache-
          # written files that the pre-remove sudo chown missed (the
          # interval between that step and this one is short, but the
          # container could have written log/cache files in that
          # window). Volume-shadowed host dirs were already handled
          # by the pre-remove chown above.
          echo y | openemr-cmd worktree remove multi-easy
          echo y | openemr-cmd worktree remove multi-light
          echo y | openemr-cmd worktree remove multi-redis

      - name: Verify all three state entries cleaned
        working-directory: openemr
        run: |
          if jq -e '."multi-easy" or ."multi-light" or ."multi-redis"' .worktrees.json 2>/dev/null; then
              echo "FAIL: a state entry remains"
              cat .worktrees.json
              exit 1
          fi
          for dir in openemr-wt-multi-easy openemr-wt-multi-light openemr-wt-multi-redis; do
              if [[ -d "${{ github.workspace }}/${dir}" ]]; then
                  echo "FAIL: ${dir} still on disk"
                  exit 1
              fi
          done
          for proj in openemr-multi-easy openemr-multi-light openemr-multi-redis; do
              rem=$(docker volume ls -q --filter "name=${proj}_" | wc -l)
              if [[ "${rem}" -ne 0 ]]; then
                  echo "FAIL: ${rem} volumes left for ${proj}"
                  docker volume ls --filter "name=${proj}_"
                  exit 1
              fi
          done
          echo "all three stacks cleaned"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== .worktrees.json ====="
          cat openemr/.worktrees.json 2>/dev/null || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          for c in openemr-multi-easy-openemr-1 openemr-multi-light-openemr-1 openemr-multi-redis-openemr-1 \
                   openemr-multi-easy-mysql-1   openemr-multi-light-mysql-1   openemr-multi-redis-mysql-1; do
              echo "===== ${c} logs (last 200) ====="
              docker logs "${c}" --tail 200 2>/dev/null || true
          done

  nonworktree-lifecycle-e2e:
    # The plain non-worktree workflow: run openemr-cmd from
    # openemr/docker/development-easy and let it manage the standard
    # compose project (project name = dir name = development-easy).
    # No -d flag — the container is auto-detected via
    # `docker ps --filter name=openemr[_\-]1` (matches the substring
    # 'openemr-1' inside 'development-easy-openemr-1').
    name: e2e — standard stack (up → exec → dn → prek → down)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      - name: openemr-cmd up (from openemr/docker/development-easy)
        working-directory: openemr/docker/development-easy
        run: |
          # Top-level `openemr-cmd up` calls `docker compose up -d` against
          # the compose file in the cwd. Container names are project-name-
          # prefixed (project = dir name = 'development-easy'); the openemr
          # container is named development-easy-openemr-1.
          openemr-cmd up

      - name: Wait for development-easy-openemr-1 to become healthy
        run: |
          cname="development-easy-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy)
                echo "container reported healthy"
                exit 0
                ;;
              unhealthy)
                echo "FAIL: container reported unhealthy"
                docker logs "${cname}" --tail 200
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "FAIL: container never became healthy in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: HTTP smoke (openemr responds on default port 8300)
        run: |
          # Standard easy stack: WT_HTTP_PORT defaults to 8300 (no .env
          # set, so the variable defaults from the compose file kick in).
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
                --connect-timeout 5 --max-time 10 \
                "http://localhost:8300/" || true)
            echo "[${i}/12] HTTP ${code}"
            case "${code}" in
              200|302|303) exit 0 ;;
            esac
            sleep 5
          done
          echo "FAIL: openemr did not respond with 2xx/3xx on port 8300"
          exit 1

      - name: "openemr-cmd e (auto-detected container): exec sentinel"
        working-directory: openemr/docker/development-easy
        run: |
          # No -d: the script auto-detects the openemr container via
          # `docker ps --filter name=openemr[_\-]1`, which substring-
          # matches development-easy-openemr-1. `e <cmd>` runs
          # `docker exec -i <id> sh -c "<cmd>"`.
          sentinel="non-worktree-exec-sentinel-$$-$(date +%s)"
          out=$(openemr-cmd e "echo ${sentinel}")
          echo "exec stdout: ${out}"
          if ! grep -Fqx "${sentinel}" <<< "${out}"; then
              echo "FAIL: exec stdout did not contain the sentinel"
              exit 1
          fi

      - name: "openemr-cmd dn (docker-names): lists running stack"
        working-directory: openemr/docker/development-easy
        run: |
          # `dn` (docker-names) lists running + other-status containers.
          # Should include at least the openemr + mysql containers and
          # print the expected banners.
          out=$(openemr-cmd dn 2>&1)
          echo "${out}"
          grep -Fq "Running Docker Names" <<< "${out}" \
              || { echo "FAIL: missing 'Running Docker Names' banner"; exit 1; }
          grep -Fq "development-easy-openemr-1" <<< "${out}" \
              || { echo "FAIL: openemr container not listed by dn"; exit 1; }

      - name: "openemr-cmd prek --version: pre-commit runs inside the container"
        working-directory: openemr/docker/development-easy
        run: |
          # prek dispatches to docker exec -w /var/www/localhost/htdocs/openemr
          # -i <id> sh -c '<inline>' sh --version. The inline script falls
          # into the pass-through branch (no config substitution) and runs
          # `exec pre-commit --version`. Validates the in-container Python
          # pre-commit toolchain is available.
          out=$(openemr-cmd prek --version 2>&1)
          echo "${out}"
          # pre-commit prints "pre-commit X.Y.Z" — we just check the prefix.
          grep -Eq "^pre-commit " <<< "${out}" \
              || { echo "FAIL: 'pre-commit X.Y.Z' not in prek --version output"; exit 1; }

      - name: openemr-cmd down -v (deletes containers + volumes)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd down

      - name: Verify hygiene (no project containers, no project volumes)
        run: |
          remaining_c=$(docker ps -aq --filter "label=com.docker.compose.project=development-easy" | wc -l)
          if [[ "${remaining_c}" -ne 0 ]]; then
              echo "FAIL: ${remaining_c} containers left from development-easy project:"
              docker ps -a --filter "label=com.docker.compose.project=development-easy"
              exit 1
          fi
          remaining_v=$(docker volume ls -q --filter "label=com.docker.compose.project=development-easy" | wc -l)
          if [[ "${remaining_v}" -ne 0 ]]; then
              echo "FAIL: ${remaining_v} volumes left from development-easy project:"
              docker volume ls --filter "label=com.docker.compose.project=development-easy"
              exit 1
          fi
          echo "standard stack cleaned"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          echo "===== openemr container logs (last 500) ====="
          docker logs development-easy-openemr-1 --tail 500 2>/dev/null || true
          echo "===== mysql container logs (last 200) ====="
          docker logs development-easy-mysql-1 --tail 200 2>/dev/null || true

  functional-roundtrip-e2e:
    # Tests the data-flow contract between openemr-cmd's CLI and the
    # in-container /root/devtools scripts: import-random-patients,
    # backup, restore, and the capsule copy commands. The script's
    # internals are openemr core's concern (covered there in
    # tests/bats/docker/release/); this job confirms that openemr-cmd's
    # assumed interface still matches what /root/devtools provides.
    #
    # End-to-end shape (mirrors a real ops flow: load demo data,
    # generate test patients, snapshot, restore on a clean machine):
    #   stack-A: up → wait healthy → confirm patient count = 0
    #          → drid (dev-reset-install-demodata) → wait healthy
    #          → capture demo_count
    #          → irp 3 → confirm count = demo_count + 3
    #          → bs roundtrip-snap → verify /snapshots/roundtrip-snap exists
    #          → gc roundtrip-snap /tmp/host → verify file on host
    #          → down -v → CLEAN SLATE (volumes gone)
    #   stack-B: up → wait healthy → confirm patient count = 0 (fresh DB)
    #          → pc /tmp/host/roundtrip-snap → verify back in container
    #          → rs roundtrip-snap → confirm count is BACK TO demo_count + 3
    #          → down -v
    #
    # If openemr core ever changes the /root/devtools interface in a
    # way that breaks openemr-cmd's assumptions (e.g. backup grows a
    # mandatory --format flag, restore changes its arg order), this
    # job fails — catching the regression before users hit it at
    # restore-from-backup time, which is the worst possible time.
    name: e2e — functional round-trip (drid → irp → bs → gc → pc → rs)
    runs-on: ubuntu-22.04
    # Two full healthy-waits + irp + bs + restore + db verification.
    # Restart (stack-B) is from a clean slate, so as slow as first boot.
    timeout-minutes: 50
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      # ---- stack-A: bring up, insert patients, snapshot, capsule out ----

      - name: stack-A — openemr-cmd up
        working-directory: openemr/docker/development-easy
        run: openemr-cmd up

      - name: stack-A — wait healthy
        run: |
          cname="development-easy-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[A ${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy) echo "stack-A healthy"; exit 0 ;;
              unhealthy) echo "FAIL: unhealthy"; docker logs "${cname}" --tail 200; exit 1 ;;
            esac
            sleep 10
          done
          echo "FAIL: stack-A never healthy in ~15 min"
          docker ps -a; docker logs "${cname}" --tail 500
          exit 1

      - name: stack-A — baseline patient_data count is 0 (fresh DB)
        working-directory: openemr/docker/development-easy
        run: |
          # Use openemr-cmd e to run the mysql client INSIDE the openemr
          # container (which has the mariadb client installed) against the
          # mysql container at the docker-network alias 'mysql'. Credentials
          # come from the easy compose file: MYSQL_USER=openemr / PASS=openemr.
          # -sN: silent + skip headers → just the number.
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-A baseline patient_data count: '${count}'"
          [[ "${count}" = "0" ]] || { echo "FAIL: expected baseline count 0, got '${count}'"; exit 1; }

      - name: stack-A — drid (dev-reset-install-demodata)
        working-directory: openemr/docker/development-easy
        run: |
          # drid runs /root/devtools dev-reset-install-demodata which wipes
          # and reinstalls openemr WITH the demo data set. Mirrors the
          # common ops flow: load demo data, then layer additional test
          # data on top, snapshot the whole thing for later restoration.
          # The handler also restarts the couchdb container post-install.
          openemr-cmd drid

      - name: stack-A — wait healthy after drid (couchdb was restarted)
        run: |
          # drid restarts the couchdb container; give the stack a moment
          # to settle before re-querying. The openemr container itself
          # is not restarted by drid, but a re-confirm is cheap insurance.
          cname="development-easy-openemr-1"
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[A-post-drid ${i}/30 @ $((i*5))s] status=${status}"
            [[ "${status}" = "healthy" ]] && exit 0
            sleep 5
          done
          echo "FAIL: openemr did not return to healthy within 2.5 min after drid"
          docker ps -a
          exit 1

      - name: stack-A — capture demo_count after drid (sanity check)
        working-directory: openemr/docker/development-easy
        run: |
          demo_count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-A post-drid demo patient_data count: '${demo_count}'"
          [[ "${demo_count}" =~ ^[0-9]+$ ]] \
              || { echo "FAIL: could not capture numeric demo_count; got '${demo_count}'"; exit 1; }
          [[ "${demo_count}" -gt 0 ]] \
              || { echo "FAIL: drid produced no demo patients (count=0)"; exit 1; }
          # Pass demo_count through so the post-irp step can confirm irp
          # actually added rows (it was silently no-op'ing before
          # openemr/openemr#12632 — this regression guard catches that).
          echo "DEMO_COUNT=${demo_count}" >> "${GITHUB_ENV}"

      - name: stack-A — irp 3 (layer random patients on top of demo data)
        working-directory: openemr/docker/development-easy
        run: |
          # irp dispatches /root/devtools import-random-patients 3 with
          # ENV_VAR=OPENEMR_ENABLE_CCDA_IMPORT=1.
          openemr-cmd irp 3

      - name: stack-A — capture pre-backup count + assert irp actually added rows
        working-directory: openemr/docker/development-easy
        run: |
          # Two assertions in one step:
          #   1. count > demo_count — irp actually inserted rows (regression
          #      guard for the silent-no-op bug fixed in openemr/openemr#12632).
          #   2. capture the count into $GITHUB_ENV so the post-restore
          #      assertion can compare against it, without depending on
          #      irp's exact insertion semantics (drid's demo set size and
          #      irp's count math both belong to openemr core and may evolve).
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-A pre-backup patient_data count: '${count}' (demo ${DEMO_COUNT})"
          [[ "${count}" =~ ^[0-9]+$ ]] \
              || { echo "FAIL: could not capture numeric pre-backup count; got '${count}'"; exit 1; }
          if [[ "${count}" -le "${DEMO_COUNT}" ]]; then
              echo "FAIL: irp 3 did not increase patient_data count (was ${DEMO_COUNT}, still ${count})"
              echo "      this is the openemr/openemr#12632 regression signature."
              exit 1
          fi
          echo "EXPECTED_AFTER_RESTORE=${count}" >> "${GITHUB_ENV}"

      - name: stack-A — bs roundtrip-snap (create backup)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd bs roundtrip-snap

      - name: stack-A — verify /snapshots/roundtrip-snap.tgz exists in container
        working-directory: openemr/docker/development-easy
        run: |
          # /root/devtools backup writes to /snapshots/<name>.tgz — the bare
          # name passed to bs becomes a tarball under /snapshots. (rs takes
          # the bare name too and strips .tgz internally; gc/pc are
          # symmetric with the actual filename including .tgz.)
          openemr-cmd e "ls -la /snapshots/"
          openemr-cmd e "test -f /snapshots/roundtrip-snap.tgz" \
              || { echo "FAIL: /snapshots/roundtrip-snap.tgz missing in container after bs"; exit 1; }

      - name: stack-A — gc roundtrip-snap.tgz → host /tmp/capsule-host
        working-directory: openemr/docker/development-easy
        run: |
          # gc copies /snapshots/<arg> (no .tgz added). Pass the full
          # filename including .tgz.
          mkdir -p /tmp/capsule-host
          openemr-cmd gc roundtrip-snap.tgz /tmp/capsule-host
          ls -la /tmp/capsule-host/
          [[ -f /tmp/capsule-host/roundtrip-snap.tgz ]] \
              || { echo "FAIL: capsule not copied to host"; exit 1; }

      - name: stack-A — down -v (clean slate)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd down

      # ---- stack-B: fresh up, copy capsule back in, restore, verify ----

      - name: stack-B — fresh openemr-cmd up (new volumes, empty DB)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd up

      - name: stack-B — wait healthy
        run: |
          cname="development-easy-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[B ${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy) echo "stack-B healthy"; exit 0 ;;
              unhealthy) echo "FAIL: unhealthy"; docker logs "${cname}" --tail 200; exit 1 ;;
            esac
            sleep 10
          done
          echo "FAIL: stack-B never healthy in ~15 min"
          docker ps -a; docker logs "${cname}" --tail 500
          exit 1

      - name: stack-B — confirm patient_data count is 0 (fresh DB, no leakage)
        working-directory: openemr/docker/development-easy
        run: |
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-B baseline patient_data count: '${count}'"
          # If this is non-zero, the down -v didn't actually delete volumes
          # (or named volumes survived) — either way it'd invalidate the
          # restore test by leaving the 3 patients from stack-A in place.
          [[ "${count}" = "0" ]] || { echo "FAIL: expected 0 patients on fresh stack-B, got '${count}'"; exit 1; }

      - name: stack-B — pc /tmp/capsule-host/roundtrip-snap.tgz (copy capsule back in)
        working-directory: openemr/docker/development-easy
        run: |
          # pc copies <host-file> to /snapshots/ (preserving basename).
          # rs strips .tgz internally — `rs roundtrip-snap` reads
          # /snapshots/roundtrip-snap.tgz. So we just shuttle the
          # actual .tgz produced by bs back and forth.
          openemr-cmd pc /tmp/capsule-host/roundtrip-snap.tgz
          openemr-cmd e "ls -la /snapshots/"
          openemr-cmd e "test -f /snapshots/roundtrip-snap.tgz" \
              || { echo "FAIL: /snapshots/roundtrip-snap.tgz missing in container after pc"; exit 1; }

      - name: stack-B — rs roundtrip-snap (restore from capsule)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd rs roundtrip-snap

      - name: stack-B — confirm post-restore patient_data count matches pre-backup (restore worked)
        working-directory: openemr/docker/development-easy
        run: |
          # The headline assertion: after rs, the count is whatever
          # stack-A captured just before bs. Proves the capsule really
          # contained the data AND restore actually restored it — the
          # full ops flow: demo + extra → backup → different machine →
          # restore → same dataset. We compare against the captured
          # pre-backup count rather than computing an expected value,
          # to insulate the test from changes to drid's demo size or
          # irp's insertion semantics.
          count=$(openemr-cmd e "mysql -u openemr -popenemr -h mysql openemr -sN -e 'SELECT COUNT(*) FROM patient_data' 2>/dev/null" | tr -d '[:space:]')
          echo "stack-B post-restore patient_data count: '${count}' (expected ${EXPECTED_AFTER_RESTORE} — captured pre-backup on stack-A)"
          [[ "${count}" = "${EXPECTED_AFTER_RESTORE}" ]] \
              || { echo "FAIL: expected ${EXPECTED_AFTER_RESTORE} patients after restore, got '${count}'"; exit 1; }
          echo "data-flow round-trip OK: drid + irp 3 → bs → gc → fresh stack → pc → rs → patient count preserved"

      - name: stack-B — down -v (final cleanup)
        working-directory: openemr/docker/development-easy
        run: openemr-cmd down

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== docker volume ls ====="
          docker volume ls || true
          echo "===== /tmp/capsule-host listing ====="
          ls -la /tmp/capsule-host/ 2>/dev/null || true
          echo "===== openemr container logs (last 500) ====="
          docker logs development-easy-openemr-1 --tail 500 2>/dev/null || true
          echo "===== mysql container logs (last 200) ====="
          docker logs development-easy-mysql-1 --tail 200 2>/dev/null || true

  prek-workflow-e2e:
    # Drives the prek-install host-hook contract end-to-end. Stands up
    # an openemr worktree, installs the openemr-cmd-managed git hooks,
    # then runs REAL `git commit` from inside the worktree to confirm:
    #   - the commit-msg hook fires through the openemr-cmd shim and
    #     rejects a non-conventional-commits message
    #   - the pre-commit hook fires through the shim and rejects a
    #     codespell-detectable typo before commit-msg ever runs
    #   - a clean change + valid message produces a real commit (both
    #     hook stages pass; HEAD advances; the staged file lands in
    #     the new commit's tree)
    # Tests the actual user flow — `git commit` triggering the
    # installed hooks — rather than invoking the hook scripts by
    # hand. A regression in shim wiring, prek_hooks_dir's
    # git-common-dir resolution, the cwd-aware container routing,
    # or hook exit-code propagation surfaces here.
    name: e2e — prek install + real git commit (reject, reject, accept)
    runs-on: ubuntu-22.04
    # One stack startup (~10-15 min to healthy on the default easy env)
    # + three sequential commits routing through the container. Each
    # commit is fast (codespell + conventional-commits are sub-second
    # hooks); the dominant cost is the boot.
    timeout-minutes: 30
    steps:
      - name: Checkout openemr-devops (for openemr-cmd)
        uses: actions/checkout@v7
        with:
          path: openemr-devops
          persist-credentials: false

      - name: Install openemr-cmd to /usr/local/bin
        run: |
          sudo install -m 0755 openemr-devops/utilities/openemr-cmd/openemr-cmd /usr/local/bin/openemr-cmd
          openemr-cmd --version || true

      - name: Clone openemr/openemr (shallow)
        uses: actions/checkout@v7
        with:
          repository: openemr/openemr
          path: openemr
          fetch-depth: 1
          persist-credentials: false

      - name: Pre-flight (versions + disk)
        run: |
          docker --version
          docker compose version
          jq --version
          df -h /

      - name: worktree add prek-e2e -b --base master --start
        working-directory: openemr
        env:
          WT_CANONICAL_URL: file://${{ github.workspace }}/openemr
        run: |
          # Default env (easy) — matches every other single-env e2e
          # in this workflow (non-worktree lifecycle, functional
          # round-trip). The prek workflow itself doesn't depend on
          # env-specific services; using the default keeps coverage
          # focused on what most developers actually run.
          openemr-cmd worktree add prek-e2e -b --base master --start
          openemr-cmd worktree list

      - name: Wait for openemr container to become healthy
        run: |
          cname="openemr-prek-e2e-openemr-1"
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "${cname}" 2>/dev/null || echo "missing")
            echo "[${i}/90 @ $((i*10))s] status=${status}"
            case "${status}" in
              healthy) echo "container reported healthy"; exit 0 ;;
              unhealthy) echo "FAIL: container reported unhealthy"; docker logs "${cname}" --tail 200; exit 1 ;;
            esac
            sleep 10
          done
          echo "FAIL: container never became healthy in ~15 min"
          docker ps -a
          docker logs "${cname}" --tail 500
          exit 1

      - name: One-shot chown back to runner (enables host-side writes + git commits)
        run: |
          # openemr's container startup chowns the whole webroot bind
          # mount to apache (uid=1000), but `git commit` runs as the
          # runner (different uid) and needs to write into the working
          # tree (probe file) and update .git/worktrees/prek-e2e/index
          # via `git add`. Chown back now that healthy confirms apache
          # is done with its setup pass. Apache may log a few EACCES
          # warnings on subsequent /meta/health/readyz probes, but the
          # prek tests below don't depend on apache continuing to
          # serve — only on the container being reachable for
          # `docker exec` (which runs as root, sidestepping the
          # bind-mount uid mismatch). The eventual `worktree remove`
          # auto-chown handles the symmetric case for teardown.
          sudo chown -R "$(id -u):$(id -g)" "${{ github.workspace }}/openemr-wt-prek-e2e"

      - name: openemr-cmd prek-install (writes shim hooks to shared .git/hooks)
        working-directory: openemr-wt-prek-e2e
        run: |
          # Run from inside the worktree so prek_hooks_dir resolves
          # git-common-dir to the SHARED hooks dir under the primary
          # clone (openemr/.git/hooks), mirroring what a developer
          # in their worktree would actually do. The shim hooks then
          # re-exec openemr-cmd's prek dispatch whenever git fires
          # them from any linked worktree on this primary.
          openemr-cmd prek-install

      - name: Verify the two managed hook files exist + carry the marker
        run: |
          # prek-install writes to git-common-dir/hooks; for the
          # primary clone that's openemr/.git/hooks (worktrees share
          # via gitcommondir). Both stages must be present, executable,
          # and contain the __openemr_cmd_prek_hook__ marker so
          # cmd_prek_uninstall later can recognize them as managed.
          for stage in pre-commit commit-msg; do
              target="openemr/.git/hooks/${stage}"
              if [[ ! -x "${target}" ]]; then
                  echo "FAIL: ${target} missing or not executable"
                  exit 1
              fi
              grep -q "__openemr_cmd_prek_hook__" "${target}" \
                  || { echo "FAIL: ${target} missing prek hook marker"; exit 1; }
              echo "----- ${stage} hook -----"
              cat "${target}"
          done

      - name: Configure git identity inside the worktree
        working-directory: openemr-wt-prek-e2e
        run: |
          # `git commit` refuses without committer identity. --local
          # scopes the config to this clone so it doesn't leak into
          # the runner's global config.
          git config --local user.email "prek-e2e@example.invalid"
          git config --local user.name  "prek e2e"

      - name: "TEST 1 (commit-msg reject): clean file + bad message → conventional-commits rejects"
        working-directory: openemr-wt-prek-e2e
        run: |
          # Stage a deliberately clean .txt file at the repo root.
          # *.txt isn't in openemr's .gitignore (only tmp/ is). NOTE:
          # filename must NOT start with `.` — codespell skips dotfiles
          # by default, which would silently pass TEST 2's typo check.
          # Single line, LF newline, no trailing whitespace, no typo —
          # so pre-commit's auto-fixers (trailing-whitespace, end-of-
          # file-fixer, mixed-line-ending) + codespell pass clean and
          # control falls through to the commit-msg hook, which routes
          # through the openemr-cmd shim into the container's
          # conventional-commits checker. "garbage no type" has no
          # type prefix → reject + non-zero git exit.
          printf 'prek probe content\n' > openemr-prek-probe.txt
          git add openemr-prek-probe.txt
          set +e
          git commit -m "garbage no type" > /tmp/commit-msg-reject.log 2>&1
          rc=$?
          set -e
          cat /tmp/commit-msg-reject.log
          if [[ "${rc}" = "0" ]]; then
              echo "FAIL: bad-message commit unexpectedly succeeded"
              git log -1
              exit 1
          fi
          # Surface the actual rejection so a silent shim short-circuit
          # (the hook printing nothing but exiting non-zero) fails
          # loudly here rather than masquerading as "test passed".
          grep -Eqi "(conventional[- ]commits?|commit message)" /tmp/commit-msg-reject.log \
              || { echo "FAIL: rejection log doesn't reference conventional-commits"; exit 1; }
          # Failed commit doesn't unstage — confirm so the next test
          # reuses the same staged file rather than silently working
          # on a different index state.
          git diff --cached --name-only | grep -Fxq "openemr-prek-probe.txt" \
              || { echo "FAIL: file unstaged after rejected commit"; exit 1; }

      - name: "TEST 2 (pre-commit reject): inject codespell typo → pre-commit rejects before commit-msg"
        working-directory: openemr-wt-prek-e2e
        run: |
          # 'teh' is a classic codespell-detected typo. Restage the
          # file with bad content; even with a perfectly valid
          # conventional-commits message, pre-commit must fire FIRST
          # and reject — so the commit-msg hook never gets to run.
          # If the ordering ever inverted (or if pre-commit dispatch
          # silently no-op'd), this test would either succeed-where-
          # it-shouldn't or fail in the wrong place.
          printf 'teh quick brown fox jumps over teh lazy dog\n' > openemr-prek-probe.txt
          git add openemr-prek-probe.txt
          set +e
          git commit -m "test(ci): prek probe" > /tmp/precommit-reject.log 2>&1
          rc=$?
          set -e
          cat /tmp/precommit-reject.log
          if [[ "${rc}" = "0" ]]; then
              echo "FAIL: typo commit unexpectedly succeeded"
              git log -1
              exit 1
          fi
          # codespell prints both a banner and the offending word;
          # assert both so a silent failure (hook returns non-zero
          # with no output) can't pass.
          grep -qi "codespell" /tmp/precommit-reject.log \
              || { echo "FAIL: pre-commit log doesn't mention codespell"; exit 1; }
          grep -q "teh" /tmp/precommit-reject.log \
              || { echo "FAIL: codespell didn't flag the injected typo"; exit 1; }

      - name: "TEST 3 (happy path): clean file + good message → commit lands"
        working-directory: openemr-wt-prek-e2e
        run: |
          # Restore clean content + use a valid conventional-commits
          # message. Both hook stages should pass; the commit should
          # actually land in the worktree's branch. HEAD advances by
          # exactly one commit and the new tree contains our file.
          printf 'prek probe content\n' > openemr-prek-probe.txt
          git add openemr-prek-probe.txt
          head_before=$(git rev-parse HEAD)
          git commit -m "test(ci): prek probe" > /tmp/commit-accept.log 2>&1
          cat /tmp/commit-accept.log
          head_after=$(git rev-parse HEAD)
          if [[ "${head_before}" = "${head_after}" ]]; then
              echo "FAIL: HEAD did not advance — commit silently dropped"
              exit 1
          fi
          git show --name-only --pretty=format: HEAD | grep -Fxq "openemr-prek-probe.txt" \
              || { echo "FAIL: probe file missing from new commit's tree"; exit 1; }
          subj=$(git log -1 --pretty=%s)
          [[ "${subj}" = "test(ci): prek probe" ]] \
              || { echo "FAIL: commit subject = '${subj}' (expected 'test(ci): prek probe')"; exit 1; }
          echo "happy-path commit landed: $(git rev-parse --short HEAD) ${subj}"

      - name: Rewind the test commit before teardown
        working-directory: openemr-wt-prek-e2e
        run: |
          # `worktree remove` doesn't care about uncommitted state —
          # it nukes the worktree dir entirely — but rewinding keeps
          # cleanup symmetric (state visible if someone inspects
          # post-failure) and avoids a stray ref on the test branch
          # carrying the probe commit in the shared .git.
          git reset --hard HEAD~1
          [[ ! -f openemr-prek-probe.txt ]] \
              || { echo "FAIL: probe file still on disk after reset"; ls -la; exit 1; }

      - name: worktree remove prek-e2e (auto-chown handles container-owned files)
        working-directory: openemr
        run: |
          # Stack is still up; the auto-chown step from #833 fixes
          # the bind mount's apache-owned files before remove proceeds.
          echo y | openemr-cmd worktree remove prek-e2e

      - name: prek-uninstall (cleans the shim hooks from the shared .git/hooks)
        working-directory: openemr
        run: |
          # The shim hooks installed earlier live in openemr/.git/hooks
          # (gitcommondir), not the now-deleted worktree's gitdir, so
          # they outlive `worktree remove`. Uninstall here so the
          # hygiene check below sees a clean state, and so any follow-
          # up worktree on this clone doesn't inherit a stale shim
          # from a previous test run.
          openemr-cmd prek-uninstall
          for stage in pre-commit commit-msg; do
              target=".git/hooks/${stage}"
              if [[ -e "${target}" ]]; then
                  echo "FAIL: ${target} still present after prek-uninstall"
                  ls -la .git/hooks/
                  exit 1
              fi
          done

      - name: Verify state hygiene
        working-directory: openemr
        run: |
          if jq -e '."prek-e2e"' .worktrees.json 2>/dev/null; then
              echo "FAIL: state entry still present"
              cat .worktrees.json
              exit 1
          fi
          if [[ -d "${{ github.workspace }}/openemr-wt-prek-e2e" ]]; then
              echo "FAIL: worktree dir still on disk"
              exit 1
          fi
          remaining=$(docker volume ls -q --filter "name=openemr-prek-e2e_" | wc -l)
          if [[ "${remaining}" -ne 0 ]]; then
              echo "FAIL: ${remaining} compose volumes left over"
              docker volume ls --filter "name=openemr-prek-e2e_"
              exit 1
          fi
          echo "prek-e2e fully cleaned"

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== docker ps -a ====="
          docker ps -a || true
          echo "===== .worktrees.json ====="
          cat openemr/.worktrees.json 2>/dev/null || true
          echo "===== installed hook files ====="
          ls -la openemr/.git/hooks/ 2>/dev/null || true
          for stage in pre-commit commit-msg; do
              echo "===== ${stage} hook contents ====="
              cat "openemr/.git/hooks/${stage}" 2>/dev/null || true
          done
          echo "===== last commit-msg-reject log ====="
          cat /tmp/commit-msg-reject.log 2>/dev/null || true
          echo "===== last precommit-reject log ====="
          cat /tmp/precommit-reject.log 2>/dev/null || true
          echo "===== last commit-accept log ====="
          cat /tmp/commit-accept.log 2>/dev/null || true
          echo "===== openemr container logs (last 500) ====="
          docker logs openemr-prek-e2e-openemr-1 --tail 500 2>/dev/null || true

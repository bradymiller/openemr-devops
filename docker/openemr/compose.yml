services:
  mysql:
    image: mariadb:11.4
    command:
    - mariadbd
    - --character-set-server=utf8mb4
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test:
      - CMD
      - /usr/local/bin/healthcheck.sh
      - --su-mysql
      - --connect
      - --innodb_initialized
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  openemr:
    profiles:
    - prod
    build:
      context: ${DOCKER_CONTEXT_PATH}
    ports:
    - 8080:80
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MANUAL_SETUP: 'yes'
      MYSQL_HOST: mysql
      MYSQL_PASS: openemr
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      OE_PASS: pass
      OE_USER: admin
      # Pass-through default empty. test-flex-edge sets this to '1' to
      # emit phase timing in openemr.sh (openemr-devops#797).
      OPENEMR_FLEX_TIMING: ${OPENEMR_FLEX_TIMING:-}
    healthcheck:
      test:
      - CMD
      - curl
      - -fsSLo/dev/null
      - http://localhost/
      # 20m start_period (was 10m): the openemr.sh runtime setup (composer +
      # npm + napa + webpack + phing) grew past 10m on Alpine edge × PHP 8.5
      # CI runners after openemr/openemr#11231 landed the webpack migration.
      # Keep the upper bound generous; healthy runs return early when curl
      # succeeds, so this only matters when something is genuinely stuck.
      # See openemr-devops#797.
      start_period: 20m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
  openemr-kcov:
    extends:
      service: openemr
    profiles: !override
    - kcov
    build:
      context: ${DOCKER_CONTEXT_PATH}
      target: kcov
    volumes:
    - ./coverage-reports:/var/www/localhost/htdocs/coverage
  openemr-dev:
    extends:
      service: openemr
    profiles: !override
    - dev
    environment:
      EMPTY: "yes"
    volumes:
    - ../../openemr:/var/www/localhost/htdocs/openemr
  openemr-kcov-dev:
    extends:
      service: openemr-dev
    profiles: !override
    - kcov-dev
    build:
      context: ${DOCKER_CONTEXT_PATH}
      target: kcov
    volumes:
    - ./coverage-reports:/var/www/localhost/htdocs/coverage
